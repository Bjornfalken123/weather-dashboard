<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kustväder</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body { margin:0; background:#0b1220; color:white; font-family:Arial;}
#map { height:50vh; }
#layerMiniMap { height:50vh; }
canvas { position:absolute; top:0; left:0; }
</style>
</head>

<body>

<div id="map"></div>
<div id="layerMiniMap"></div>
<canvas id="canvas"></canvas>

<script>
// ========================
// MAIN MAP
// ========================
const map = L.map("map").setView([58.6,13],6);

L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
  maxZoom: 19
}).addTo(map);

// ========================
// RADAR MAP
// ========================
const radarMap = L.map("layerMiniMap").setView([58.6,13],5);

L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
  maxZoom: 19
}).addTo(radarMap);

// ========================
// RADAR IMAGE
// ========================
let radarLayer;

async function loadRadar() {
  try {
    const res = await fetch("/api/radar");
    const data = await res.json();

    const frame = data.frames?.[0];
    if (!frame) return;

    if (radarLayer) radarMap.removeLayer(radarLayer);

    radarLayer = L.imageOverlay(
      frame.url,
      [[55,10],[70,25]] // Sverige bounding box
    );

    radarLayer.addTo(radarMap);

  } catch(e) {
    console.error("Radar error", e);
  }
}

loadRadar();

// ========================
// WIND FIELD (SVARTA PILAR)
// ========================
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight/2;
}
resizeCanvas();

function drawWind(speed=5, dir=120) {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  const cols = 12;
  const rows = 6;

  const angle = (dir+180)*Math.PI/180;

  for(let i=0;i<cols;i++){
    for(let j=0;j<rows;j++){

      const x = (i+0.5)*canvas.width/cols;
      const y = (j+0.5)*canvas.height/rows;

      ctx.save();
      ctx.translate(x,y);
      ctx.rotate(angle);

      ctx.strokeStyle="black";
      ctx.fillStyle="black";
      ctx.lineWidth=2;

      ctx.beginPath();
      ctx.moveTo(0,-10);
      ctx.lineTo(0,10);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(0,-14);
      ctx.lineTo(-4,-6);
      ctx.lineTo(4,-6);
      ctx.fill();

      ctx.restore();
    }
  }
}

drawWind();

// ========================
// CLICK POINT
// ========================
radarMap.on("click",(e)=>{
  console.log("punkt:",e.latlng);
});

// ========================
window.addEventListener("resize",resizeCanvas);
</script>

</body>
</html>
