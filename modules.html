<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moduler – väder, boj och fyr</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    /* === OFÖRÄNDRAD DESIGN === */
    :root {
      --bg: #0b1220;
      --bg-soft: #121a2b;
      --card: rgba(255, 255, 255, 0.08);
      --card-border: rgba(255, 255, 255, 0.12);
      --text: #eef4ff;
      --muted: #a9b4c9;
      --accent: #69b7ff;
      --accent-2: #8ef0d0;
      --danger: #ff8b8b;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
      --radius: 20px;
    }

    body {
      margin: 0;
      font-family: Inter, Arial;
      color: var(--text);
      background: #0b1220;
    }

    #map {
      height: 500px;
      border-radius: 20px;
    }
  </style>
</head>
<body>
<div class="container">
  <div id="map"></div>
</div>

<script>
/* =========================================================
   🔥 NYTT: GLOBAL CACHE (för ALLA moduler)
========================================================= */

const cache = {
  wave: new Map(),
  water: new Map(),
  lighthouse: new Map(),
};

const pending = {
  wave: new Map(),
  water: new Map(),
  lighthouse: new Map(),
};

/* =========================================================
   🔁 GENERISK FETCH MED CACHE + DE-DUPE
========================================================= */

async function cachedFetch(type, key, url) {
  if (cache[type].has(key)) {
    return cache[type].get(key);
  }

  if (pending[type].has(key)) {
    return pending[type].get(key);
  }

  const promise = fetch(url)
    .then(r => r.json())
    .then(data => {
      cache[type].set(key, data);
      pending[type].delete(key);
      return data;
    })
    .catch(err => {
      pending[type].delete(key);
      throw err;
    });

  pending[type].set(key, promise);
  return promise;
}

/* =========================================================
   🗺️ MAP INIT
========================================================= */

const map = L.map("map").setView([59.3, 18.1], 6);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  attribution: "© OpenStreetMap"
}).addTo(map);

/* =========================================================
   🌊 BOJMODUL – OPTIMERAD
========================================================= */

async function getWave(stationId) {
  return cachedFetch(
    "wave",
    stationId,
    `/api/ocean-wave-height?station=${stationId}`
  );
}

async function getWater(stationId) {
  return cachedFetch(
    "water",
    stationId,
    `/api/ocean-water-level?station=${stationId}`
  );
}

async function checkBuoy(station) {
  try {
    const wave = await getWave(station.id);

    let hasData = wave?.value;

    if (!hasData) {
      const water = await getWater(station.id);
      hasData = water?.value;
    }

    return hasData;
  } catch {
    return false;
  }
}

/* =========================================================
   🗼 FYRMODUL – OPTIMERAD
========================================================= */

async function getLighthouseObs(id) {
  return cachedFetch(
    "lighthouse",
    id,
    `/api/lighthouse-observations?station=${id}`
  );
}

async function checkLighthouse(station) {
  try {
    const data = await getLighthouseObs(station.id);
    return !!data;
  } catch {
    return false;
  }
}

/* =========================================================
   ⚙️ BACKGROUND CHECK (Samma design – bättre motor)
========================================================= */

async function runQueue(items, worker, concurrency = 2) {
  let index = 0;

  async function next() {
    if (index >= items.length) return;

    const i = index++;
    await worker(items[i]);

    return next();
  }

  const workers = [];
  for (let i = 0; i < concurrency; i++) {
    workers.push(next());
  }

  await Promise.all(workers);
}

/* =========================================================
   🧪 DEMO DATA (ersätts av dina riktiga endpoints)
========================================================= */

const fakeBuoys = Array.from({ length: 20 }).map((_, i) => ({
  id: i + 1,
  lat: 58 + Math.random() * 5,
  lon: 16 + Math.random() * 5,
}));

const fakeLights = Array.from({ length: 20 }).map((_, i) => ({
  id: i + 100,
  lat: 58 + Math.random() * 5,
  lon: 16 + Math.random() * 5,
}));

/* =========================================================
   🎯 START
========================================================= */

runQueue(fakeBuoys, async (b) => {
  const has = await checkBuoy(b);

  L.circleMarker([b.lat, b.lon], {
    radius: 6,
    color: has ? "red" : "gray"
  }).addTo(map);
}, 2);

runQueue(fakeLights, async (l) => {
  const has = await checkLighthouse(l);

  L.circleMarker([l.lat, l.lon], {
    radius: 6,
    color: has ? "red" : "gray"
  }).addTo(map);
}, 3);

</script>
</body>
</html>
