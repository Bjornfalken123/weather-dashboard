<script>
  var activeMode="weather",
      showWaveObjects=false,
      showLighthouseObjects=false,
      lastObjectInteractionAt=0,
      forecastExpanded=false,
      currentForecastDays=[],
      weatherTimeseries=[],
      selectedForecastTime=null,
      timePlaybackTimer=null,
      weatherDetailsExpanded=false;

  var savedSelections={weather:null,wave:null,lighthouse:null};
  var maptilerMap=null,
      maptilerWeatherMarker=null,
      maptilerWindLayer=null,
      maptilerPrecipitationLayer=null,
      maptilerCloudLayer=null,
      maptilerTimelineLayer=null;

  var windLayerVisible=false,
      precipitationLayerVisible=false,
      cloudLayerVisible=false;

  var waveStationsLayer=L.layerGroup(),
      lighthouseStationsLayer=L.layerGroup();

  var waveStationsLoaded=false,
      lighthouseStationsLoaded=false,
      waveStationsLoadingPromise=null,
      lighthouseStationsLoadingPromise=null;

  var waveBackgroundCheckStarted=false,
      lighthouseBackgroundCheckStarted=false;

  var waveMarkerMap=new Map(),
      lighthouseMarkerMap=new Map(),
      waveMaptilerMarkerMap=new Map(),
      lighthouseMaptilerMarkerMap=new Map(),
      selectedWaveStationId=null,
      selectedLighthouseStationId=null;

  var waveStationsCache=new Map(),
      lighthouseStationsCache=new Map();

  var waterLevelStationsPromise=null,
      vivaStationsPromise=null;

  var vivaStationDataCache=new Map(),
      vivaNearestCache=new Map(),
      waveEvaluationCache=new Map(),
      lighthouseObservationCache=new Map();

  var latestWeatherRequestId=0,
      latestWaveSelectionRequestId=0,
      latestLighthouseSelectionRequestId=0,
      latestSearchRequestId=0,
      searchDebounceTimer=null;

  function markObjectInteraction(){ lastObjectInteractionAt=Date.now(); }
  function setText(id,v){ var el=document.getElementById(id); if(el) el.textContent=v; }

  function isMobileView(){
    return window.matchMedia("(max-width:700px)").matches;
  }

  function updateActiveLayersBadge(){
    var count=[windLayerVisible,precipitationLayerVisible,cloudLayerVisible].filter(Boolean).length;
    var badge=document.getElementById("activeLayersBadge"),
        text=document.getElementById("activeLayersText"),
        fb=document.getElementById("filterBadge");

    if(badge && text){
      badge.classList.toggle("visible",count>0);
      if(count>0) text.textContent=count+" lager";
    }
    if(fb) fb.classList.toggle("visible",count>0);
  }

  function setOverlayHeaderDot(state){
    var dot=document.getElementById("overlayHeaderDot");
    if(dot) dot.classList.toggle("loading",state==="loading");
  }

  function buildOverlayDataGrid(rows){
    return '<div class="overlay-data-grid">'+
      rows
        .filter(function(r){
          return r && r.value!==null && r.value!==undefined && r.value!=="" && r.value!=="--";
        })
        .map(function(r){
          return '<div class="overlay-data-cell"><div class="overlay-data-label">'+r.label+'</div><div class="overlay-data-value'+(r.highlight?" highlight":"")+'">'+r.value+'</div></div>';
        })
        .join("")+
      '</div>';
  }

  function renderCombinedMapOverlay(){
    var titleEl=document.getElementById("overlayTitle"),
        contentEl=document.getElementById("overlayContent");
    if(!titleEl || !contentEl) return;

    titleEl.textContent=titleEl.dataset.baseTitle || "Välj punkt";

    var base=contentEl.dataset.baseContent || "Klicka i kartan för väderdata";

    var waveTitle=contentEl.dataset.waveTitle || "";
    var waveContent=contentEl.dataset.waveContent || "";

    var lighthouseTitle=contentEl.dataset.lighthouseTitle || "";
    var lighthouseContent=contentEl.dataset.lighthouseContent || "";

    var html='<div>'+base+'</div>';

    if(waveTitle && waveContent){
      html +=
        '<div class="overlay-object-section">' +
          '<div class="overlay-object-title">'+waveTitle+'</div>' +
          '<div>'+waveContent+'</div>' +
        '</div>';
    }

    if(lighthouseTitle && lighthouseContent){
      html +=
        '<div class="overlay-object-section">' +
          '<div class="overlay-object-title">'+lighthouseTitle+'</div>' +
          '<div>'+lighthouseContent+'</div>' +
        '</div>';
    }

    contentEl.innerHTML=html;
  }

  function updateMapOverlay(title,content){
    var t=document.getElementById("overlayTitle"),
        c=document.getElementById("overlayContent");
    if(!t || !c) return;

    t.dataset.baseTitle=title;
    c.dataset.baseContent=content;
    renderCombinedMapOverlay();
  }

  function updateWaveOverlay(title,content){
    var c=document.getElementById("overlayContent");
    if(!c) return;
    c.dataset.waveTitle=title;
    c.dataset.waveContent=content;
    renderCombinedMapOverlay();
  }

  function updateLighthouseOverlay(title,content){
    var c=document.getElementById("overlayContent");
    if(!c) return;
    c.dataset.lighthouseTitle=title;
    c.dataset.lighthouseContent=content;
    renderCombinedMapOverlay();
  }

  function hideWaveOverlay(){
    var c=document.getElementById("overlayContent");
    if(!c) return;
    c.dataset.waveTitle="";
    c.dataset.waveContent="";
    renderCombinedMapOverlay();
  }

  function hideLighthouseOverlay(){
    var c=document.getElementById("overlayContent");
    if(!c) return;
    c.dataset.lighthouseTitle="";
    c.dataset.lighthouseContent="";
    renderCombinedMapOverlay();
  }

  function hideObjectOverlay(){
    hideWaveOverlay();
    hideLighthouseOverlay();
  }

  function formatCoord(v){ return Number(v).toFixed(4); }
  function formatTemp(v){ return v==null ? "--" : Number(v).toFixed(1)+" °C"; }
  function formatHumidity(v){ return v==null ? "--" : Math.round(Number(v))+" %"; }
  function formatRain(v){ return v==null ? "--" : Number(v).toFixed(1)+" mm"; }
  function formatWind(v){ return v==null ? "--" : Number(v).toFixed(1)+" m/s"; }
  function formatPressure(v){ return v==null ? "--" : Number(v).toFixed(1)+" hPa"; }
  function formatWave(v){ return v==null ? "--" : Number(v).toFixed(1)+" m"; }
  function formatWaterLevel(v){ return v==null ? "--" : Number(v).toFixed(1)+" cm"; }

  function formatForecastRange(min,max){
    if(min==null && max==null) return "--";
    if(min==null) return formatTemp(max);
    if(max==null) return formatTemp(min);
    return Math.round(min)+"° / "+Math.round(max)+"°";
  }

  function formatForecastDay(ds,i){
    if(!ds) return "--";
    if(i===0) return "Idag";
    if(i===1) return "Imorgon";
    return new Date(ds+"T12:00:00").toLocaleDateString("sv-SE",{weekday:"short",day:"2-digit",month:"2-digit"});
  }

  function formatObsTime(v){
    if(!v) return "--";
    var n=Number(v);
    var d=(!isNaN(n) && String(v).length>=10) ? new Date(n) : new Date(v);
    if(isNaN(d.getTime())) return String(v);
    return d.toLocaleString("sv-SE",{year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"});
  }

  function formatObservedValue(fv,obs){
    if(!fv || fv==="--") return "--";
    var rt=obs && (obs.date || obs.time) || null;
    var tt=formatObsTime(rt);
    if(!rt || tt==="--") return fv;
    return fv+" • "+tt;
  }

  function weatherLabelFromSymbol(sc){
    if(!sc) return "--";
    var k=sc.replace(/_(day|night|polartwilight)$/,"");
    var L={
      "clearsky":"Klart",
      "fair":"Mestadels klart",
      "partlycloudy":"Delvis molnigt",
      "cloudy":"Molnigt",
      "lightrainshowers":"Lätta regnskurar",
      "rainshowers":"Regnskurar",
      "heavyrainshowers":"Kraftiga regnskurar",
      "lightrain":"Lätt regn",
      "rain":"Regn",
      "heavyrain":"Kraftigt regn",
      "lightsleet":"Lätt snöblandat regn",
      "sleet":"Snöblandat regn",
      "heavysleet":"Kraftigt snöblandat regn",
      "lightsnow":"Lätt snöfall",
      "snow":"Snöfall",
      "heavysnow":"Kraftigt snöfall",
      "fog":"Dimma"
    };
    return L[k] || k;
  }

  function weatherIconFromSymbol(sc){
    if(!sc) return "•";
    var k=sc.replace(/_(day|night|polartwilight)$/,"");

    var icons={
      clearsky:"☀️",
      fair:"🌤️",
      partlycloudy:"⛅",
      cloudy:"☁️",
      lightrainshowers:"🌦️",
      rainshowers:"🌦️",
      heavyrainshowers:"⛈️",
      lightrain:"🌦️",
      rain:"🌧️",
      heavyrain:"🌧️",
      lightsleet:"🌨️",
      sleet:"🌨️",
      heavysleet:"🌨️",
      lightsnow:"🌨️",
      snow:"❄️",
      heavysnow:"❄️",
      fog:"🌫️"
    };

    return icons[k] || "•";
  }

  function formatWeatherDateTime(v){
    if(!v) return "--";
    var d=new Date(v);
    if(isNaN(d.getTime())) return "--";
    return d.toLocaleString("sv-SE",{
      weekday:"short",
      day:"2-digit",
      month:"short",
      hour:"2-digit",
      minute:"2-digit"
    });
  }

  function degreesToCompass(deg){
    if(deg==null || isNaN(Number(deg))) return "--";
    return ["N","NO","O","SO","S","SV","V","NV"][Math.round(((Number(deg)%360)+360)%360/45)%8];
  }

  function formatWindDirection(deg){
    if(deg==null || isNaN(Number(deg))) return "--";
    return Math.round(Number(deg))+"° "+degreesToCompass(Number(deg));
  }

  function formatWindWithDirection(speed,deg){
    var wind=formatWind(speed);
    var dir=formatWindDirection(deg);

    if(wind==="--" && dir==="--") return "--";
    if(wind==="--") return dir;
    if(dir==="--") return wind;

    return wind+" • "+dir;
  }

  function extractLatestValue(data){
    if(Array.isArray(data && data.value) && data.value.length) return data.value[data.value.length-1];
    if(Array.isArray(data && data.values) && data.values.length) return data.values[data.values.length-1];
    return null;
  }

  function extractNumericValue(v){
    if(v==null) return null;
    if(typeof v==="number") return isFinite(v) ? v : null;
    var m=String(v).replace(",",".").trim().match(/-?\d+(?:\.\d+)?/g);
    if(!m || !m.length) return null;
    var p=Number(m[m.length-1]);
    return isFinite(p) ? p : null;
  }

  function extractVivaSample(sd,names){
    var samples=Array.isArray(sd && sd.Samples) ? sd.Samples : [];
    for(var i=0;i<names.length;i++){
      var s=samples.find(function(x){ return x && x.Name===names[i]; });
      if(!s) continue;
      var nv=extractNumericValue(s.Value);
      if(nv==null) continue;
      return Object.assign({},s,{numericValue:nv});
    }
    return null;
  }

  function formatWaveSourceLabel(r){
    if(!r) return "--";
    return r.source==="VIVA" ? "VIVA" : (r.period || r.source || "--");
  }

  function formatWaterStationLabel(r){
    if(!r || !r.station || !r.station.name) return "Ingen station hittades";
    return r.source==="VIVA" ? r.station.name+" (VIVA)" : r.station.name;
  }

  function toRad(d){ return d*Math.PI/180; }

  function distanceKm(a,b,c,d){
    var R=6371,
        dLat=toRad(c-a),
        dLon=toRad(d-b),
        x=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(toRad(a))*Math.cos(toRad(c))*Math.sin(dLon/2)*Math.sin(dLon/2);
    return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
  }

  function buildVivaNearestCacheKey(lat,lon,names,lm){
    return Number(lat).toFixed(3)+":"+Number(lon).toFixed(3)+":"+names.join("|")+":"+(lm?"light":"full");
  }

  function buildWaveEvaluationCacheKey(s,lm){
    return s.id+":"+(lm?"light":"full");
  }

  function updateMapViewportOffsets(){
    if(!maptilerMap) return;

    try{
      var mobile=isMobileView();
      var overlay=document.getElementById("mapOverlayPanel");
      var timeControl=document.getElementById("timeControl");
      var padding={top:20,right:20,bottom:20,left:20};

      if(overlay && overlay.offsetParent!==null){
        padding.top=Math.max(20, overlay.offsetHeight + (mobile ? 22 : 26));
      }
      if(timeControl && timeControl.offsetParent!==null){
        padding.bottom=Math.max(20, timeControl.offsetHeight + (mobile ? 24 : 26));
      }

      maptilerMap.easeTo({
        center: maptilerMap.getCenter(),
        zoom: maptilerMap.getZoom(),
        duration: 0,
        padding: padding
      });
    }catch(e){
      console.warn("Kunde inte uppdatera map padding",e);
    }
  }

  function refreshMapSizeSoon(){
    setTimeout(function(){
      try{ map.invalidateSize(); }catch(e){}
      try{ if(maptilerMap) maptilerMap.resize(); }catch(e){}
      updateMapViewportOffsets();
    },60);
  }

  function setActiveTab(id){
    document.querySelectorAll(".tab-btn").forEach(function(b){ b.classList.remove("active"); });
    var t=document.getElementById(id);
    if(t) t.classList.add("active");
  }

  function refreshMobileNavState(){
    var filterOpen=mobileFilterSheet && mobileFilterSheet.classList.contains("is-open");
    var searchOpen=mobileSearchSheet && mobileSearchSheet.classList.contains("is-open");

    if(searchOpen){
      setActiveTab("tabSearch");
      return;
    }

    if(filterOpen){
      setActiveTab("tabFilter");
      return;
    }

    if(showWaveObjects && !showLighthouseObjects){
      setActiveTab("tabWave");
      return;
    }

    if(showLighthouseObjects && !showWaveObjects){
      setActiveTab("tabLighthouse");
      return;
    }

    setActiveTab("tabWeather");
  }

  var map=L.map("map",{zoomControl:false}).setView([58.6,13.0],6);
  L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:19,attribution:"&copy; OpenStreetMap"}).addTo(map);

  var MAPTILER_API_KEY="72WUquDNJCLDzyB9DSky";

  if(window.maptilersdk){
    maptilersdk.config.apiKey=MAPTILER_API_KEY;

    maptilerMap=new maptilersdk.Map({
      container:"maptilerMap",
      style:maptilersdk.MapStyle.STREETS.DARK,
      center:[13.0,58.6],
      zoom:5
    });

    maptilerMap.on("load",function(){
      if(!window.maptilerweather){
        console.error("MapTiler Weather ej tillgänglig");
        return;
      }

      try{
        maptilerWindLayer=new maptilerweather.WindLayer({
          id:"main-wind-layer",
          colorramp:maptilerweather.ColorRamp.builtin.NULL,
          speed:0.001,
          fadeFactor:0.03,
          maxAmount:128,
          density:2,
          size:2.7,
          color:[80,220,120,90],
          fastColor:[255,70,70,180],
          fastSpeed:0.9
        });

        maptilerPrecipitationLayer=new maptilerweather.PrecipitationLayer({
          id:"main-precipitation-layer",
          colorramp:maptilerweather.ColorRamp.builtin.PRECIPITATION,
          opacity:0.95,
          smooth:true
        });

        maptilerCloudLayer=new maptilerweather.RadarLayer({
          id:"main-cloud-layer",
          colorramp:maptilerweather.ColorRamp.builtin.RADAR_CLOUD,
          opacity:0.85,
          smooth:true
        });

        maptilerTimelineLayer=new maptilerweather.PrecipitationLayer({
          id:"timeline-controller-layer",
          opacity:0,
          smooth:true
        });
        maptilerMap.addLayer(maptilerTimelineLayer);

        if(windLayerVisible){
          maptilerMap.addLayer(maptilerWindLayer);
        }

        var timeSlider=document.getElementById("timeSlider"),
            timeValueLabel=document.getElementById("timeValueLabel"),
            timePlayPauseBtn=document.getElementById("timePlayPauseBtn"),
            playIcon=document.getElementById("playIcon"),
            playBtnText=document.getElementById("playBtnText");

        var forecastStartTime=null,
            forecastEndTime=null,
            isTimePlaying=false;

        function setDeskBtn(id,on){
          var b=document.getElementById(id);
          if(!b) return;
          b.textContent=on ? "På" : "Av";
          b.classList.toggle("is-on",on);
          b.classList.toggle("is-off",!on);
        }

        function setMobToggle(id,on){
          var b=document.getElementById(id);
          if(b) b.classList.toggle("is-on",on);
        }

        function syncAllLayerButtons(){
          setDeskBtn("toggleWindLayerBtn",windLayerVisible);
          setDeskBtn("togglePrecipLayerBtn",precipitationLayerVisible);
          setDeskBtn("toggleCloudLayerBtn",cloudLayerVisible);
          setDeskBtn("toggleWaveModeBtn",showWaveObjects);
          setDeskBtn("toggleLighthouseModeBtn",showLighthouseObjects);

          setMobToggle("mobileToggleWindBtn",windLayerVisible);
          setMobToggle("mobileTogglePrecipBtn",precipitationLayerVisible);
          setMobToggle("mobileToggleCloudBtn",cloudLayerVisible);
          setMobToggle("mobileToggleWaveBtn",showWaveObjects);
          setMobToggle("mobileToggleLighthouseBtn",showLighthouseObjects);

          updateActiveLayersBadge();
          refreshMobileNavState();
        }

        function formatMapTime(v){
          if(!v) return "--";
          var d=new Date(v);
          if(isNaN(d.getTime())) return "--";
          return d.toLocaleString("sv-SE",{weekday:"short",day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"});
        }

        function updateTimeLabel(){
          if(timeValueLabel) timeValueLabel.textContent=selectedForecastTime ? formatMapTime(selectedForecastTime) : "--";
        }

        function updateTimeTicks(){
          if(!forecastStartTime || !forecastEndTime) return;
          ["tick0","tick1","tick2","tick3","tick4"].forEach(function(id,i){
            var el=document.getElementById(id);
            if(!el) return;
            var t=new Date(forecastStartTime+(forecastEndTime-forecastStartTime)*i/4);
            el.textContent=t.toLocaleString("sv-SE",{weekday:"short",hour:"2-digit",minute:"2-digit"});
          });
        }

        function applySelectedForecastTime(){
          if(!selectedForecastTime) return;
          var s=selectedForecastTime/1000;

          try{ if(maptilerTimelineLayer) maptilerTimelineLayer.setAnimationTime(s); }catch(e){}
          try{ if(maptilerWindLayer) maptilerWindLayer.setAnimationTime(s); }catch(e){}
          try{ if(maptilerPrecipitationLayer) maptilerPrecipitationLayer.setAnimationTime(s); }catch(e){}
          try{ if(maptilerCloudLayer) maptilerCloudLayer.setAnimationTime(s); }catch(e){}

          if(timeSlider) timeSlider.value=String(selectedForecastTime);
          updateTimeLabel();

          if(window.updateWeatherForSelectedTime) window.updateWeatherForSelectedTime();
        }

        function stopTimePlayback(){
          if(timePlaybackTimer){
            clearInterval(timePlaybackTimer);
            timePlaybackTimer=null;
          }
          isTimePlaying=false;
          if(playIcon) playIcon.innerHTML='<polygon points="2,1 11,6 2,11"></polygon>';
          if(playBtnText) playBtnText.textContent="Spela";
        }

        function getFirstReadyTimelineLayer(){
          var candidates=[
            maptilerTimelineLayer,
            maptilerPrecipitationLayer,
            maptilerCloudLayer,
            maptilerWindLayer
          ];

          for(var i=0;i<candidates.length;i++){
            var layer=candidates[i];
            if(!layer) continue;

            var sd=layer.getAnimationStartDate && layer.getAnimationStartDate();
            var ed=layer.getAnimationEndDate && layer.getAnimationEndDate();
            var cd=layer.getAnimationTimeDate && layer.getAnimationTimeDate();

            if(sd && ed && cd && isFinite(+sd) && isFinite(+ed) && isFinite(+cd)){
              return {
                layer:layer,
                start:+sd,
                end:+ed,
                current:+cd
              };
            }
          }

          return null;
        }

        function initializeForecastTimeline(){
          if(!timeSlider) return false;

          var timeline=getFirstReadyTimelineLayer();
          if(!timeline) return false;

          forecastStartTime=timeline.start;
          forecastEndTime=timeline.end;
          selectedForecastTime=timeline.current;

          timeSlider.min=String(forecastStartTime);
          timeSlider.max=String(forecastEndTime);
          timeSlider.step=String(60*60*1000);
          timeSlider.value=String(selectedForecastTime);

          updateTimeLabel();
          applySelectedForecastTime();
          updateTimeTicks();
          refreshMapSizeSoon();
          return true;
        }

        function onWindToggle(){
          if(!maptilerWindLayer) return;
          if(windLayerVisible){
            maptilerMap.removeLayer("main-wind-layer");
          }else{
            maptilerMap.addLayer(maptilerWindLayer);
            if(selectedForecastTime) maptilerWindLayer.setAnimationTime(selectedForecastTime/1000);
          }
          windLayerVisible=!windLayerVisible;
          syncAllLayerButtons();
        }

        function onPrecipToggle(){
          if(!maptilerPrecipitationLayer) return;
          if(precipitationLayerVisible){
            maptilerMap.removeLayer("main-precipitation-layer");
          }else{
            maptilerMap.addLayer(maptilerPrecipitationLayer);
            if(selectedForecastTime) maptilerPrecipitationLayer.setAnimationTime(selectedForecastTime/1000);
          }
          precipitationLayerVisible=!precipitationLayerVisible;
          syncAllLayerButtons();
        }

        function onCloudToggle(){
          if(!maptilerCloudLayer) return;
          if(cloudLayerVisible){
            maptilerMap.removeLayer("main-cloud-layer");
          }else{
            maptilerMap.addLayer(maptilerCloudLayer);
            if(selectedForecastTime) maptilerCloudLayer.setAnimationTime(selectedForecastTime/1000);
          }
          cloudLayerVisible=!cloudLayerVisible;
          syncAllLayerButtons();
        }

        ["toggleWindLayerBtn","mobileToggleWindBtn"].forEach(function(id){
          var el=document.getElementById(id);
          if(el) el.addEventListener("click",onWindToggle);
        });

        ["togglePrecipLayerBtn","mobileTogglePrecipBtn"].forEach(function(id){
          var el=document.getElementById(id);
          if(el) el.addEventListener("click",onPrecipToggle);
        });

        ["toggleCloudLayerBtn","mobileToggleCloudBtn"].forEach(function(id){
          var el=document.getElementById(id);
          if(el) el.addEventListener("click",onCloudToggle);
        });

        var mobileToggleWaveBtn=document.getElementById("mobileToggleWaveBtn");
        if(mobileToggleWaveBtn){
          mobileToggleWaveBtn.addEventListener("click",function(){
            showWaveObjects=!showWaveObjects;
            updateModeUI();
            syncAllLayerButtons();
          });
        }

        var mobileToggleLighthouseBtn=document.getElementById("mobileToggleLighthouseBtn");
        if(mobileToggleLighthouseBtn){
          mobileToggleLighthouseBtn.addEventListener("click",function(){
            showLighthouseObjects=!showLighthouseObjects;
            updateModeUI();
            syncAllLayerButtons();
          });
        }

        [maptilerTimelineLayer, maptilerPrecipitationLayer, maptilerCloudLayer, maptilerWindLayer].forEach(function(layer){
          if(!layer || !layer.on) return;
          layer.on("sourceReady",function(){
            initializeForecastTimeline();
          });
        });

        setTimeout(function(){ initializeForecastTimeline(); },800);
        setTimeout(function(){ initializeForecastTimeline(); },1400);
        syncAllLayerButtons();

        if(timeSlider){
          var handleChange=function(){
            stopTimePlayback();
            selectedForecastTime=parseInt(timeSlider.value,10);
            applySelectedForecastTime();
          };

          var stopTouch=function(e){ e.stopPropagation(); };

          timeSlider.addEventListener("input",handleChange);
          timeSlider.addEventListener("change",handleChange);
          timeSlider.addEventListener("touchstart",stopTouch,{passive:true});
          timeSlider.addEventListener("touchmove",stopTouch,{passive:true});
          timeSlider.addEventListener("touchend",function(e){ stopTouch(e); handleChange(); },{passive:true});
          timeSlider.addEventListener("pointerdown",stopTouch);
          timeSlider.addEventListener("pointermove",stopTouch);
          timeSlider.addEventListener("pointerup",stopTouch);

          var tc=document.getElementById("timeControl");
          if(tc){
            tc.addEventListener("touchstart",stopTouch,{passive:true});
            tc.addEventListener("touchmove",stopTouch,{passive:true});
            tc.addEventListener("pointerdown",stopTouch);
          }

          if(timePlayPauseBtn){
            timePlayPauseBtn.addEventListener("touchstart",stopTouch,{passive:true});
            timePlayPauseBtn.addEventListener("touchend",stopTouch,{passive:true});
            timePlayPauseBtn.addEventListener("pointerdown",stopTouch);
            timePlayPauseBtn.addEventListener("click",stopTouch);
          }
        }

        if(timePlayPauseBtn){
          timePlayPauseBtn.addEventListener("click",function(){
            if(!forecastStartTime || !forecastEndTime || !selectedForecastTime) return;

            if(isTimePlaying){
              stopTimePlayback();
              return;
            }

            isTimePlaying=true;
            if(playIcon){
              playIcon.innerHTML='<rect x="2" y="1" width="3.5" height="10" rx="1"></rect><rect x="6.5" y="1" width="3.5" height="10" rx="1"></rect>';
            }
            if(playBtnText) playBtnText.textContent="Pausa";

            timePlaybackTimer=setInterval(function(){
              if(!selectedForecastTime) return;
              var next=selectedForecastTime+60*60*1000;
              selectedForecastTime=next>forecastEndTime ? forecastStartTime : next;
              applySelectedForecastTime();
            },700);
          });
        }

        refreshMapSizeSoon();
      }catch(err){
        console.error("Fel vid skapande av väderlager.",err);
      }
    });

    var isSyncMT=false,isSyncL=false;

    maptilerMap.on("moveend",function(){

      isSyncMT=true;
      var c=maptilerMap.getCenter();
      map.setView([c.lat,c.lng],maptilerMap.getZoom(),{animate:false});
      setTimeout(function(){ isSyncMT=false; },0);
    });

    map.on("moveend",function(){
      if(isSyncMT || !maptilerMap) return;
      isSyncL=true;
      var c=map.getCenter();
      maptilerMap.jumpTo({center:[c.lng,c.lat],zoom:map.getZoom()});
      setTimeout(function(){ isSyncL=false; },0);
    });
  }else{

  function buildDailyForecast(ts){
    var dm=new Map();

    for(var i=0;i<ts.length;i++){
      var item=ts[i],
          time=item && item.time;
      if(!time) continue;

      var dk=time.slice(0,10),
          inst=(item.data && item.data.instant && item.data.instant.details) || {},
          at=inst.air_temperature,
          prec=((item.data && item.data.next_1_hours && item.data.next_1_hours.details && item.data.next_1_hours.details.precipitation_amount) || 0),
          sym=((item.data && item.data.next_1_hours && item.data.next_1_hours.summary && item.data.next_1_hours.summary.symbol_code) ||
               (item.data && item.data.next_6_hours && item.data.next_6_hours.summary && item.data.next_6_hours.summary.symbol_code) ||
               (item.data && item.data.next_12_hours && item.data.next_12_hours.summary && item.data.next_12_hours.summary.symbol_code) || null),
          wind=inst.wind_speed || null,
          hour=new Date(time).getHours();

      if(!dm.has(dk)){
        dm.set(dk,{
          date:dk,
          minTemp:at,
          maxTemp:at,
          precipitation:0,
          symbol:sym,
          windSpeed:wind,
          bestSymbolDistance:Math.abs(hour-12)
        });
      }

      var day=dm.get(dk);
      if(at!=null){
        day.minTemp=day.minTemp==null ? at : Math.min(day.minTemp,at);
        day.maxTemp=day.maxTemp==null ? at : Math.max(day.maxTemp,at);
      }
      day.precipitation+=Number(prec || 0);

      var sd=Math.abs(hour-12);
      if(sym && (day.symbol==null || sd<day.bestSymbolDistance)){
        day.symbol=sym;
        day.bestSymbolDistance=sd;
      }
      if(wind!=null && sd<=day.bestSymbolDistance){
        day.windSpeed=wind;
      }
    }

    return Array.from(dm.values()).slice(0,7);
  }

  async function loadWeatherForPoint(lat,lon){
    var requestId=++latestWeatherRequestId;

    try{
      setText("weatherStatusValue","Hämtar prognos...");
      setText("weatherGustSourceValue","Hämtar...");
      resetForecastDisplay();
      setOverlayHeaderDot("loading");
      updateMapOverlay("Laddar väder...",formatCoord(lat)+", "+formatCoord(lon));

      var responses = await Promise.all([
        fetch("/api/weather?lat=" + lat + "&lon=" + lon),
        fetch("/api/openmeteo-gust?lat=" + lat + "&lon=" + lon)
      ]);

      if(requestId!==latestWeatherRequestId) return;

      var weatherRes = responses[0];
      var gustRes = responses[1];

      var weatherText = await weatherRes.text();
      var gustText = await gustRes.text();

      if(requestId!==latestWeatherRequestId) return;
      if(!weatherRes.ok) throw new Error(weatherText);

      var weatherData = JSON.parse(weatherText);
      var ts = (weatherData.properties && weatherData.properties.timeseries) || [];

      if(!ts.length) throw new Error("Ingen väderdata hittades.");

      weatherTimeseries = ts;

      var cur = ts[0];
      var inst = (cur.data && cur.data.instant && cur.data.instant.details) || {};
      var n1 = (cur.data && cur.data.next_1_hours) || {};
      var n6 = (cur.data && cur.data.next_6_hours) || {};
      var n12 = (cur.data && cur.data.next_12_hours) || {};

      var sym =
        (n1.summary && n1.summary.symbol_code) ||
        (n6.summary && n6.summary.symbol_code) ||
        (n12.summary && n12.summary.symbol_code) ||
        null;

      var prec = null;
      if(n1.details && n1.details.precipitation_amount != null){
        prec = n1.details.precipitation_amount;
      }else if(n6.details && n6.details.precipitation_amount != null){
        prec = n6.details.precipitation_amount;
      }else if(n12.details && n12.details.precipitation_amount != null){
        prec = n12.details.precipitation_amount;
      }

      setText("weatherTempValue",formatTemp(inst.air_temperature));
      setText("weatherHumidityValue",formatHumidity(inst.relative_humidity));
      setText("weatherRainValue",formatRain(prec));
      setText("weatherTypeValue",weatherLabelFromSymbol(sym));
      setText("weatherWindValue",formatWind(inst.wind_speed));
      setText("weatherDirectionValue",formatWindDirection(inst.wind_from_direction));
      setText("weatherPressureValue",formatPressure(inst.air_pressure_at_sea_level));

      currentForecastDays = buildDailyForecast(ts);
      renderForecast(currentForecastDays);

      var gustFormatted = "--";
      var gustTimeseries = [];

      if(gustRes.ok){
        var gd = JSON.parse(gustText);
        gustFormatted = formatWind(gd.value);
        gustTimeseries = gd.timeseries || [];
        setText("weatherGustValue",gustFormatted);
        setText("weatherGustSourceValue","Open-Meteo • punktdata");
        setText("weatherStatusValue",currentForecastDays.length > 0 ? "Väderdata och dagsprognos hämtad" : "Väderdata hämtad");
      }else{
        setText("weatherGustValue","--");
        setText("weatherGustSourceValue","Inga vindbyar tillgängliga");
        setText("weatherStatusValue",currentForecastDays.length > 0 ? "Väderdata och dagsprognos hämtad" : "Väderdata hämtad");
      }

      if(requestId!==latestWeatherRequestId) return;
      setOverlayHeaderDot("ready");

      function getGustForTime(tms){
        if(!gustTimeseries.length) return gustFormatted;

        var cl = gustTimeseries[0];
        var md = Math.abs(new Date(cl.time).getTime() - tms);

        for(var i=0;i<gustTimeseries.length;i++){
          var df = Math.abs(new Date(gustTimeseries[i].time).getTime() - tms);
          if(df < md){
            md = df;
            cl = gustTimeseries[i];
          }
        }
        return formatWind(cl.value);
      }

      function buildWeatherOverlay(pt,temp,ws,wd,gust,rain,pres,humidity,symbol,lat,lon){
        var detailsButtonText=weatherDetailsExpanded ? "Visa mindre" : "Se mer";

        var detailsHtml="";
        if(weatherDetailsExpanded){
          detailsHtml=
            '<div class="weather-extra-details">' +
              buildOverlayDataGrid([
                {label:"Vind",value:formatWindWithDirection(ws,wd)},
                {label:"Vindbyar",value:gust},
                {label:"Nederbörd",value:formatRain(rain)},
                {label:"Lufttryck",value:formatPressure(pres)},
                {label:"Luftfuktighet",value:formatHumidity(humidity)}
              ]) +
            '</div>';
        }

        return ''
          + '<div class="weather-overview">'
          +   '<div class="weather-icon">'+weatherIconFromSymbol(symbol)+'</div>'
          +   '<div class="weather-main">'
          +     '<div class="weather-main-title">'+weatherLabelFromSymbol(symbol)+'</div>'
          +     '<div class="weather-main-time">'+formatWeatherDateTime(pt)+'</div>'
          +   '</div>'
          + '</div>'
          + '<div class="weather-temp-big">'+formatTemp(temp)+'</div>'
          + '<div class="weather-point-line">Punkt: '+formatCoord(lat)+', '+formatCoord(lon)+'</div>'
          + '<button type="button" class="weather-details-toggle" id="weatherDetailsToggleBtn">'+detailsButtonText+'</button>'
          + detailsHtml;
      }

      function updateWeatherForSelectedTime(){
        if(requestId!==latestWeatherRequestId) return;
        if(!weatherTimeseries.length || !selectedForecastTime) return;

        var tms = new Date(selectedForecastTime).getTime();
        var cl = weatherTimeseries[0];
        var md = Math.abs(new Date(cl.time).getTime() - tms);

        for(var i=0;i<weatherTimeseries.length;i++){
          var df = Math.abs(new Date(weatherTimeseries[i].time).getTime() - tms);
          if(df < md){
            md = df;
            cl = weatherTimeseries[i];
          }
        }

        var si = (cl.data && cl.data.instant && cl.data.instant.details) || {};
        var sn1 = (cl.data && cl.data.next_1_hours) || {};
        var sn6 = (cl.data && cl.data.next_6_hours) || {};
        var sn12 = (cl.data && cl.data.next_12_hours) || {};

        var ss =
          (sn1.summary && sn1.summary.symbol_code) ||
          (sn6.summary && sn6.summary.symbol_code) ||
          (sn12.summary && sn12.summary.symbol_code) ||
          null;

        var sp = null;
        if(sn1.details && sn1.details.precipitation_amount != null){
          sp = sn1.details.precipitation_amount;
        }else if(sn6.details && sn6.details.precipitation_amount != null){
          sp = sn6.details.precipitation_amount;
        }else if(sn12.details && sn12.details.precipitation_amount != null){
          sp = sn12.details.precipitation_amount;
        }

        var gft = getGustForTime(tms);

        setText("weatherTempValue",formatTemp(si.air_temperature));
        setText("weatherHumidityValue",formatHumidity(si.relative_humidity));
        setText("weatherRainValue",formatRain(sp));
        setText("weatherTypeValue",weatherLabelFromSymbol(ss));
        setText("weatherWindValue",formatWind(si.wind_speed));
        setText("weatherDirectionValue",formatWindDirection(si.wind_from_direction));
        setText("weatherPressureValue",formatPressure(si.air_pressure_at_sea_level));
        setText("weatherGustValue",gft);

        updateMapOverlay(
          weatherLabelFromSymbol(ss),
          buildWeatherOverlay(
            cl.time,
            si.air_temperature,
            si.wind_speed,
            si.wind_from_direction,
            gft,
            sp,
            si.air_pressure_at_sea_level,
            si.relative_humidity,
            ss,
            lat,
            lon
          )
        );
      }

      window.updateWeatherForSelectedTime = updateWeatherForSelectedTime;

      if(selectedForecastTime){
        updateWeatherForSelectedTime();
      }else{
        updateMapOverlay(
          weatherLabelFromSymbol(sym),
          buildWeatherOverlay(
            cur.time,
            inst.air_temperature,
            inst.wind_speed,
            inst.wind_from_direction,
            gustFormatted,
            prec,
            inst.air_pressure_at_sea_level,
            inst.relative_humidity,
            sym,
            lat,
            lon
          )
        );
      }
    }catch(err){
      if(requestId!==latestWeatherRequestId) return;
      console.error(err);
      setOverlayHeaderDot("ready");
      setText("weatherStatusValue","Det gick inte att hämta väderdata");
      updateMapOverlay("Fel","Det gick inte att hämta väderdata för vald punkt.");
    }
  }

  async function ensureWaveStationsLoaded(){
    if(waveStationsLoaded) return;
    if(waveStationsLoadingPromise) return waveStationsLoadingPromise;

    waveStationsLoadingPromise=(async function(){
      try{
        var res=await fetch("/api/ocean-wave-stations"),
            data=await res.json(),
            stations=Array.isArray(data && data.stations) ? data.stations : [];

        if(!stations.length){
          if(activeMode==="wave") setText("waveStatusValue","Inga stationer hittades");
          return;
        }

        stations.forEach(function(s){
          waveStationsCache.set(s.id,s);
        });

        waveStationsLoaded=true;
        if(activeMode==="wave") setText("waveStatusValue","Kontrollerar vilka bojar som har data...");
        startWaveBackgroundCheck();
      }catch(e){
        console.error(e);
        if(activeMode==="wave") setText("waveStatusValue","Det gick inte att hämta stationer");
      }finally{
        waveStationsLoadingPromise=null;
      }
    })();

    return waveStationsLoadingPromise;
  }

      var res=await fetch("/api/ocean-wave-height?stationId="+id+"&period="+p),
          data=await res.json();
      if(!res.ok) continue;
      var l=extractLatestValue(data);
      if(l && l.value!=null && l.value!=="") return {latest:l,period:p,source:"SMHI"};
    }
    return null;
  }

  async function getWaterLevelStations(){
    if(!waterLevelStationsPromise){
      waterLevelStationsPromise=(async function(){
        var res=await fetch("/api/ocean-stations"),
            data=await res.json();

        var st=Array.isArray(data && data.station) ? data.station :
               Array.isArray(data && data.stations) ? data.stations :
               Array.isArray(data && data.resource) ? data.resource : [];

        return st.map(function(s){
          var id=s.id || s.key || s.stationId,
              lat=Number(s.latitude),
              lon=Number(s.longitude);
          if(!id || isNaN(lat) || isNaN(lon)) return null;
          return {
            id:id,
            name:s.name || "Okänd station",
            latitude:lat,
            longitude:lon
          };
        }).filter(Boolean);
      })();

  async function findNearestVivaObservationForPoint(lat,lon,names,lm){
    var ck=buildVivaNearestCacheKey(lat,lon,names,lm);
    if(vivaNearestCache.has(ck)) return vivaNearestCache.get(ck);

    var p=(async function(){
      var st=await getVivaStations();
      var rk=st.map(function(s){
        return Object.assign({},s,{distanceKm:distanceKm(lat,lon,s.latitude,s.longitude)});
      }).sort(function(a,b){
        return a.distanceKm-b.distanceKm;
      }).slice(0,lm?4:10);

      for(var s of rk){
        if(s.distanceKm>80) continue;
        try{
          var sd=await fetchVivaStationData(s.id),
              sa=extractVivaSample(sd,names);
          if(sa){
            return {
              station:s,
              latest:{value:sa.numericValue,time:sa.Updated || null},
              source:"VIVA",
              sampleName:sa.Name
            };
          }
        }catch(e){
          console.warn("VIVA misslyckades",s.id,e);
        }
      }
      return null;
    })();

    vivaNearestCache.set(ck,p);

    try{
      return await p;
    }catch(e){
      vivaNearestCache.delete(ck);
      throw e;
    }
  }

  async function findNearestWaterLevelForPoint(lat,lon,lm){
    var st=await getWaterLevelStations();
    var rk=st.map(function(s){
      return Object.assign({},s,{distanceKm:distanceKm(lat,lon,s.latitude,s.longitude)});
    }).sort(function(a,b){
      return a.distanceKm-b.distanceKm;
    }).slice(0,lm?5:15);

    var periods=lm ? ["latest-hour","latest-day"] : ["latest-hour","latest-day","latest-months"];

    for(var s of rk){
      for(var per of periods){
        var res=await fetch("/api/ocean-water-level?stationId="+s.id+"&period="+per),
            data=await res.json();
        if(!res.ok) continue;
        var l=extractLatestValue(data);
        if(l && l.value!=null && l.value!==""){
          return {station:s,latest:l,period:per,source:"SMHI"};
        }
      }
    }
    return null;
  }

  async function evaluateWaveStation(s,lm){
    var ck=buildWaveEvaluationCacheKey(s,lm);
    if(waveEvaluationCache.has(ck)) return waveEvaluationCache.get(ck);

    var p=(async function(){
      var results=await Promise.all([
        findNearestVivaObservationForPoint(s.latitude,s.longitude,["Våghöjd"],lm),
        findNearestVivaObservationForPoint(s.latitude,s.longitude,["Vattenstånd"],lm),
        findNearestVivaObservationForPoint(s.latitude,s.longitude,["Vattentemperatur","Vatten Temperatur","Ytvattentemperatur"],lm)
      ]);

      var vw=results[0],
          vwt=results[1],
          vwtp=results[2];

      var fallbackResults=await Promise.all([
        vw ? Promise.resolve(null) : fetchWaveDataForStation(s.id),
        vwt ? Promise.resolve(null) : findNearestWaterLevelForPoint(s.latitude,s.longitude,lm)
      ]);

      var sw=fallbackResults[0],
          swt=fallbackResults[1];

      var wr=vw || sw,
          wtr=vwt || swt,
          wtrp=vwtp || null;

      return {
        waveResult:wr,
        waterResult:wtr,
        waterTempResult:wtrp,
        hasAnySeaData:Boolean(wr || wtr)
      };
    })();

    waveEvaluationCache.set(ck,p);

    try{
      return await p;
    }catch(e){
      waveEvaluationCache.delete(ck);
      throw e;
    }
  }

              setTimeout(function(){
                resetAppHeightAfterKeyboard();
              },320);
            };

            mobileSearchResults.appendChild(div);
          });
        }catch(err){
          if(requestId!==latestSearchRequestId) return;
          console.error("Sökfel",err);
          mobileSearchResults.innerHTML='<div class="search-result-item">Kunde inte söka just nu</div>';
        }
      },250);
    });
  }

  updateModeUI();
  updateActiveLayersBadge();

  Promise.all([
    ensureWaveStationsLoaded().catch(function(e){console.error("Preload bojar misslyckades",e);}),
    ensureLighthouseStationsLoaded().catch(function(e){console.error("Preload fyrar misslyckades",e);})
  ]);

  var stableAppHeight = 0;

  function getLockedAppHeight(){
    var mobile = isMobileView();

    if(!mobile){
      return window.innerHeight;
    }

    var screenHeight = window.screen && window.screen.height ? window.screen.height : window.innerHeight;
    var viewportHeight = window.innerHeight;
    var vvHeight = window.visualViewport ? window.visualViewport.height : viewportHeight;

    return Math.max(screenHeight, viewportHeight, vvHeight);
  }

  function updateAppHeightVars(force){
    var newHeight = getLockedAppHeight();

    if(force || !stableAppHeight){
      stableAppHeight = newHeight;
    }else{
      stableAppHeight = Math.max(stableAppHeight, newHeight);
    }

    document.documentElement.style.setProperty("--app-height", stableAppHeight + "px");

    var bottomBar = document.getElementById("bottomTabBar");
    var bottomBarHeight = 0;

    if(bottomBar && window.getComputedStyle(bottomBar).display !== "none"){
      bottomBarHeight = bottomBar.offsetHeight;
    }

    var extraGap = 18;
    document.documentElement.style.setProperty("--bottom-ui-offset", bottomBarHeight + "px");
    document.documentElement.style.setProperty("--time-control-bottom", (bottomBarHeight + extraGap) + "px");
  }

  function resetAppHeightAfterKeyboard(){
    stableAppHeight = getLockedAppHeight();
    updateAppHeightVars(true);
    refreshMapSizeSoon();

    setTimeout(function(){
      stableAppHeight = getLockedAppHeight();
      updateAppHeightVars(true);
      refreshMapSizeSoon();
    }, 180);

    setTimeout(function(){
      stableAppHeight = getLockedAppHeight();
      updateAppHeightVars(true);
      refreshMapSizeSoon();
    }, 420);
  }

  window.addEventListener("resize", function(){
    if(!mobileSearchSheet || !mobileSearchSheet.classList.contains("is-open")){
      updateAppHeightVars(true);
    }
  });

  window.addEventListener("orientationchange", function(){
    setTimeout(function(){
      stableAppHeight = getLockedAppHeight();
      updateAppHeightVars(true);
      refreshMapSizeSoon();
    }, 300);
  });

  window.addEventListener("load", function(){
    stableAppHeight = getLockedAppHeight();
    updateAppHeightVars(true);
    refreshMapSizeSoon();
  });

  if(window.visualViewport){
    window.visualViewport.addEventListener("resize", function(){
      if(!mobileSearchSheet || !mobileSearchSheet.classList.contains("is-open")){
        updateAppHeightVars(true);
      }
    });
  }

  setTimeout(function(){
    stableAppHeight = getLockedAppHeight();
    updateAppHeightVars(true);
    refreshMapSizeSoon();
  },100);

  setTimeout(function(){
    stableAppHeight = getLockedAppHeight();
    updateAppHeightVars(true);
    refreshMapSizeSoon();
  },400);

  setTimeout(function(){
    stableAppHeight = getLockedAppHeight();
    updateAppHeightVars(true);
    refreshMapSizeSoon();
  },900);
</script>
