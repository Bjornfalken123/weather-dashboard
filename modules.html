<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Kustväder – väder, vågor och stationer i realtid</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

  <link href="https://cdn.maptiler.com/maptiler-sdk-js/v3.10.2/maptiler-sdk.css" rel="stylesheet" />
  <script src="https://cdn.maptiler.com/maptiler-sdk-js/v3.10.2/maptiler-sdk.umd.min.js"></script>
  <script src="https://cdn.maptiler.com/maptiler-weather/v3.1.1/maptiler-weather.umd.min.js"></script>

  <style>
    :root{
      --bg-1:#040913;
      --bg-2:#08101d;
      --bg-3:#0c1727;
      --border:rgba(255,255,255,0.11);
      --border-strong:rgba(255,255,255,0.18);
      --text:#f3f7ff;
      --text-soft:#dfe8f7;
      --muted:#95a5bf;
      --muted-soft:#b7c5d9;
      --accent:#7bc7ff;
      --accent-2:#98f0db;
      --accent-gold:#e8d7a8;
      --shadow-lg:0 30px 80px rgba(0,0,0,0.42);
      --shadow-md:0 20px 50px rgba(0,0,0,0.28);
      --radius-xl:30px;
      --radius-lg:24px;
      --radius-md:18px;
      --transition:260ms cubic-bezier(0.22,1,0.36,1);
      --transition-fast:180ms ease;

      --tab-bar-height:74px;
      --safe-bottom:env(safe-area-inset-bottom,0px);
      --safe-top:env(safe-area-inset-top,0px);

      --app-height:100vh;
      --bottom-ui-offset:calc(var(--tab-bar-height) + var(--safe-bottom));
      --time-control-bottom:calc(var(--bottom-ui-offset) + 18px);

      --overlay-top:16px;
      --mobile-side-gap:12px;
      --mobile-panel-gap:10px;
    }

    *{box-sizing:border-box;}
    html{scroll-behavior:smooth;}
    body{
      margin:0;
      font-family:Inter,Arial,Helvetica,sans-serif;
      color:var(--text);
      min-height:100vh;
      background:
        radial-gradient(circle at 8% 0%,rgba(123,199,255,0.16) 0%,transparent 24%),
        radial-gradient(circle at 92% 8%,rgba(152,240,219,0.10) 0%,transparent 18%),
        radial-gradient(circle at 50% 100%,rgba(180,199,255,0.10) 0%,transparent 20%),
        linear-gradient(180deg,var(--bg-1) 0%,var(--bg-2) 42%,var(--bg-3) 100%);
      overflow-x:hidden;
    }

    html,body{
      height:var(--app-height);
    }

    .container,
    .map-panel,
    .map-instance-wrap,
    #maptilerMap,
    #map{
      min-height:var(--app-height);
    }

    body::before,
    body::after{
      content:"";
      position:fixed;
      pointer-events:none;
      z-index:0;
      filter:blur(80px);
      opacity:0.75;
    }
    body::before{
      top:-120px;
      left:-120px;
      width:360px;
      height:360px;
      border-radius:999px;
      background:rgba(123,199,255,0.14);
    }
    body::after{
      right:-110px;
      top:150px;
      width:320px;
      height:320px;
      border-radius:999px;
      background:rgba(152,240,219,0.10);
    }

    button,
    input,
    select,
    textarea{font:inherit;}

    .container{
      position:relative;
      z-index:1;
      max-width:1600px;
      margin:0 auto;
      padding:18px;
    }

    .map-panel{
      position:relative;
      overflow:hidden;
      border-radius:var(--radius-xl);
      border:1px solid var(--border);
      background:linear-gradient(180deg,rgba(255,255,255,0.075) 0%,rgba(255,255,255,0.045) 100%);
      backdrop-filter:blur(22px) saturate(155%);
      -webkit-backdrop-filter:blur(22px) saturate(155%);
      box-shadow:var(--shadow-md);
      padding:18px;
      min-height:calc(100vh - 36px);
    }

    .map-panel::before{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      border-radius:inherit;
      background:linear-gradient(180deg,rgba(255,255,255,0.08) 0%,rgba(255,255,255,0.015) 46%,rgba(255,255,255,0.03) 100%);
    }

    .map-panel::after{
      content:"";
      position:absolute;
      inset:1px;
      border-radius:inherit;
      border:1px solid rgba(255,255,255,0.025);
      pointer-events:none;
    }

    .map-note{
      position:relative;
      z-index:1;
      margin-bottom:16px;
      color:var(--muted-soft);
      font-size:14px;
      line-height:1.6;
    }

    .map-stack{
      position:relative;
      z-index:1;
    }

    .map-instance-wrap{
      position:relative;
      isolation:isolate;
    }

    #map,
    #maptilerMap{
      position:relative;
      z-index:1;
      width:100%;
      height:calc(100vh - 72px);
      min-height:620px;
      border-radius:24px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,0.12);
      box-shadow:inset 0 1px 0 rgba(255,255,255,0.04),0 20px 42px rgba(0,0,0,0.24);
    }

    .map-topbar{
      position:absolute;
      top:16px;
      left:16px;
      z-index:1200;
      display:flex;
      gap:8px;
      align-items:center;
      flex-wrap:wrap;
      max-width:calc(100% - 32px);
    }

    #filterToggleBtn{
      appearance:none;
      border:1px solid rgba(255,255,255,0.12);
      background:rgba(5,11,22,0.82);
      color:var(--text);
      border-radius:14px;
      padding:10px 14px;
      font-size:12px;
      font-weight:800;
      letter-spacing:0.01em;
      cursor:pointer;
      backdrop-filter:blur(14px);
      -webkit-backdrop-filter:blur(14px);
      box-shadow:0 8px 20px rgba(0,0,0,0.28),inset 0 1px 0 rgba(255,255,255,0.05);
      display:flex;
      align-items:center;
      gap:7px;
      transition:background 180ms ease,border-color 180ms ease,transform 180ms ease;
    }
    #filterToggleBtn:hover{
      transform:translateY(-1px);
      border-color:rgba(255,255,255,0.2);
    }
    #filterToggleBtn svg{
      width:14px;
      height:14px;
      opacity:0.75;
    }

    #activeLayersBadge{
      display:none;
      align-items:center;
      gap:5px;
      padding:7px 11px;
      border-radius:999px;
      font-size:11px;
      font-weight:700;
      color:var(--accent);
      border:1px solid rgba(123,199,255,0.28);
      background:rgba(123,199,255,0.1);
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
      max-width:100%;
    }
    #activeLayersBadge.visible{display:flex;}
    .badge-dot{
      width:6px;
      height:6px;
      border-radius:999px;
      background:var(--accent);
      box-shadow:0 0 6px rgba(123,199,255,0.6);
    }

    #mapOverlayPanel{
      position:absolute;
      top:16px;
      left:50%;
      transform:translateX(-50%);
      z-index:1100;
      padding:0;
      border-radius:20px;
      border:1px solid rgba(255,255,255,0.11);
      background:rgba(5,11,22,0.84);
      backdrop-filter:blur(18px) saturate(160%);
      -webkit-backdrop-filter:blur(18px) saturate(160%);
      color:var(--text);
      font-size:13px;
      width:min(360px, calc(100vw - 160px));
      min-width:280px;
      max-width:calc(100vw - 32px);
      box-shadow:0 16px 42px rgba(0,0,0,0.38),inset 0 1px 0 rgba(255,255,255,0.05);
      overflow:hidden;
      transition:max-height 220ms ease,width 220ms ease,transform 220ms ease;
    }

    #mapOverlayPanel.is-collapsed #overlayBody{
      display:none;
    }

    #overlayHeader{
      display:flex;
      align-items:center;
      gap:9px;
      padding:11px 14px 9px;
      border-bottom:1px solid rgba(255,255,255,0.065);
      background:linear-gradient(180deg,rgba(255,255,255,0.055) 0%,rgba(255,255,255,0.02) 100%);
      min-height:48px;
    }

    #overlayHeaderDot{
      width:8px;
      height:8px;
      border-radius:999px;
      background:var(--accent-2);
      flex-shrink:0;
      box-shadow:0 0 8px rgba(152,240,219,0.6);
      transition:background 300ms ease,box-shadow 300ms ease;
    }

    #overlayHeaderDot.loading{
      background:var(--accent-gold);
      box-shadow:0 0 8px rgba(232,215,168,0.6);
      animation:blink-dot 900ms ease-in-out infinite;
    }

    @keyframes blink-dot{
      0%,100%{opacity:1;}
      50%{opacity:0.35;}
    }

    #overlayTitle{
      font-weight:800;
      font-size:13px;
      letter-spacing:-0.01em;
      color:var(--text);
      flex:1;
      min-width:0;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    #overlayCollapseBtn{
      appearance:none;
      border:1px solid rgba(255,255,255,0.08);
      background:rgba(255,255,255,0.04);
      color:var(--text-soft);
      min-width:58px;
      height:30px;
      padding:0 10px;
      border-radius:10px;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      flex-shrink:0;
      font-size:11px;
      font-weight:700;
      transition:transform 160ms ease,background 160ms ease,border-color 160ms ease;
    }

    #overlayCollapseBtn:hover{
      transform:translateY(-1px);
      background:rgba(255,255,255,0.08);
      border-color:rgba(255,255,255,0.16);
    }

    #overlayBody{
      padding:10px 14px 12px;
      max-height:min(68vh, 680px);
      overflow:auto;
      -webkit-overflow-scrolling:touch;
    }

    #overlayContent{
      color:var(--muted-soft);
      font-size:12px;
      line-height:1.65;
    }

    .weather-overview{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:10px;
}

.weather-icon{
  width:42px;
  height:42px;
  border-radius:14px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.08);
  font-size:22px;
  flex-shrink:0;
}

.weather-main{
  min-width:0;
  flex:1;
}

.weather-main-title{
  font-size:14px;
  font-weight:800;
  color:var(--text);
  line-height:1.2;
}

.weather-main-time{
  margin-top:3px;
  font-size:11px;
  color:var(--muted-soft);
  line-height:1.3;
}

.weather-temp-big{
  margin:8px 0 10px;
  font-size:28px;
  font-weight:900;
  letter-spacing:-0.03em;
  color:var(--text);
  line-height:1;
}

.weather-point-line{
  margin-bottom:10px;
  font-size:11px;
  color:var(--muted);
}
.weather-details-toggle{
  appearance:none;
  border:1px solid rgba(255,255,255,0.08);
  background:rgba(255,255,255,0.04);
  color:var(--text-soft);
  border-radius:10px;
  padding:8px 10px;
  font-size:11px;
  font-weight:700;
  cursor:pointer;
  margin-top:2px;
  margin-bottom:10px;
  transition:background 160ms ease,border-color 160ms ease,transform 160ms ease;
}

.weather-details-toggle:hover{
  background:rgba(255,255,255,0.08);
  border-color:rgba(255,255,255,0.16);
  transform:translateY(-1px);
}

.weather-extra-details{
  margin-top:2px;
}

    .overlay-data-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:6px;
      margin-top:4px;
    }

    .overlay-data-cell{
      min-width:0;
      padding:7px 9px;
      border-radius:10px;
      border:1px solid rgba(255,255,255,0.055);
      background:rgba(255,255,255,0.035);
    }

    .overlay-data-label{
      color:var(--muted);
      font-size:10px;
      font-weight:700;
      letter-spacing:0.06em;
      text-transform:uppercase;
      margin-bottom:2px;
    }

    .overlay-data-value{
      color:var(--text-soft);
      font-size:13px;
      font-weight:800;
      line-height:1.3;
      word-break:break-word;
    }

    .overlay-data-value.highlight{
      color:var(--accent);
    }

    .overlay-object-section{
      margin-top:10px;
      padding-top:10px;
      border-top:1px solid rgba(255,255,255,0.07);
    }

    .overlay-object-title{
      margin-bottom:6px;
      font-size:10px;
      font-weight:800;
      color:var(--accent-2);
      letter-spacing:0.07em;
      text-transform:uppercase;
    }

    #filterDrawer{
      position:absolute;
      top:60px;
      left:16px;
      width:272px;
      max-width:calc(100% - 32px);
      z-index:1250;
      padding:14px;
      border-radius:20px;
      border:1px solid rgba(255,255,255,0.11);
      background:rgba(5,11,22,0.9);
      backdrop-filter:blur(18px) saturate(150%);
      -webkit-backdrop-filter:blur(18px) saturate(150%);
      box-shadow:0 20px 48px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.04);
    }

    #filterDrawer.is-hidden{display:none;}

    #filterDrawer:not(.is-hidden){
      animation:drawerOpen 220ms cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes drawerOpen{
      from{opacity:0;transform:translateY(-8px) scale(0.96);}
      to{opacity:1;transform:translateY(0) scale(1);}
    }

    .filter-drawer-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      margin-bottom:14px;
    }

    .filter-drawer-title{
      font-size:11px;
      font-weight:800;
      color:var(--text);
      letter-spacing:0.08em;
      text-transform:uppercase;
    }

    #filterCloseBtn{
      appearance:none;
      border:1px solid rgba(255,255,255,0.1);
      background:rgba(11,20,34,0.82);
      color:var(--text);
      border-radius:10px;
      padding:7px 11px;
      font-size:11px;
      font-weight:800;
      cursor:pointer;
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
    }

    .filter-group + .filter-group{
      margin-top:14px;
      padding-top:14px;
      border-top:1px solid rgba(255,255,255,0.07);
    }

    .filter-group-title{
      margin-bottom:9px;
      font-size:10px;
      font-weight:700;
      letter-spacing:0.1em;
      text-transform:uppercase;
      color:var(--muted);
    }

    .filter-row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      padding:9px 11px;
      border-radius:13px;
      background:rgba(255,255,255,0.032);
      border:1px solid rgba(255,255,255,0.055);
      transition:background 160ms ease;
    }

    .filter-row:hover{background:rgba(255,255,255,0.05);}
    .filter-row + .filter-row{margin-top:7px;}

    .filter-row-left{
      display:flex;
      align-items:center;
      gap:9px;
      min-width:0;
    }

    .filter-row-left span:last-child{
      font-size:12px;
      color:var(--text);
      font-weight:600;
      min-width:0;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    .filter-row button{
      appearance:none;
      border:1px solid rgba(255,255,255,0.1);
      background:rgba(11,20,34,0.82);
      color:var(--text);
      border-radius:10px;
      padding:7px 12px;
      font-size:11px;
      font-weight:800;
      cursor:pointer;
      transition:background 180ms ease,border-color 180ms ease;
      flex-shrink:0;
      min-width:52px;
    }

    .filter-row button.is-on{
      background:rgba(43,108,255,0.9);
      color:#fff;
      border-color:rgba(123,199,255,0.35);
    }

    .filter-row button.is-off{
      background:rgba(255,255,255,0.06);
      color:var(--muted-soft);
      border-color:rgba(255,255,255,0.08);
    }

    .layer-dot{
      width:8px;
      height:8px;
      border-radius:999px;
      display:inline-block;
      flex-shrink:0;
    }
    .layer-dot.wind{background:#dfe8f7;box-shadow:0 0 10px rgba(223,232,247,0.35);}
    .layer-dot.precip{background:#7bc7ff;box-shadow:0 0 10px rgba(123,199,255,0.45);}
    .layer-dot.cloud{background:#b7c5d9;box-shadow:0 0 10px rgba(183,197,217,0.4);}

    #timeControl{
      position:absolute;
      left:50%;
      transform:translateX(-50%);
      bottom:16px;
      z-index:1200;
      width:min(760px, calc(100% - 32px));
      padding:14px 16px;
      border-radius:20px;
      border:1px solid rgba(255,255,255,0.09);
      background:rgba(5,11,22,0.86);
      backdrop-filter:blur(18px) saturate(155%);
      -webkit-backdrop-filter:blur(18px) saturate(155%);
      box-shadow:0 12px 36px rgba(0,0,0,0.34),inset 0 1px 0 rgba(255,255,255,0.04);
      pointer-events:auto;
      touch-action:none;
    }

    .time-compact-top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      margin-bottom:12px;
    }

    .time-compact-label{
      font-size:10px;
      font-weight:700;
      letter-spacing:0.1em;
      text-transform:uppercase;
      color:var(--muted);
      flex-shrink:0;
    }

    #timeValueLabel{
      font-size:12px;
      color:var(--text);
      font-weight:800;
      text-align:right;
      min-width:120px;
      letter-spacing:-0.01em;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    .time-compact-bottom{
      display:grid;
      grid-template-columns:90px 1fr;
      gap:10px;
      align-items:center;
    }

    #timePlayPauseBtn{
      appearance:none;
      border:1px solid rgba(255,255,255,0.1);
      background:rgba(11,20,34,0.82);
      color:var(--text);
      border-radius:14px;
      padding:10px 14px;
      font-size:12px;
      font-weight:800;
      cursor:pointer;
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
      box-shadow:0 8px 20px rgba(0,0,0,0.22),inset 0 1px 0 rgba(255,255,255,0.04);
      min-width:84px;
      min-height:44px;
      touch-action:manipulation;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:6px;
      transition:transform 180ms ease;
    }

    #timePlayPauseBtn:hover{transform:translateY(-1px);}
    #timePlayPauseBtn svg{
      width:12px;
      height:12px;
      flex-shrink:0;
    }

    #timeSlider{
      width:100%;
      margin:0;
      pointer-events:auto;
      touch-action:none;
      -webkit-appearance:none;
      appearance:none;
      height:8px;
      border-radius:999px;
      background:linear-gradient(90deg,rgba(123,199,255,0.7) 0%,rgba(152,240,219,0.5) 55%,rgba(255,255,255,0.12) 100%);
      border:1px solid rgba(255,255,255,0.055);
      box-shadow:inset 0 1px 3px rgba(0,0,0,0.28);
      cursor:pointer;
    }

    #timeSlider::-webkit-slider-thumb{
      -webkit-appearance:none;
      width:18px;
      height:18px;
      border-radius:999px;
      border:1.5px solid rgba(255,255,255,0.7);
      background:linear-gradient(180deg,#ffffff 0%,#c6e4ff 100%);
      box-shadow:0 0 0 4px rgba(123,199,255,0.15),0 6px 16px rgba(0,0,0,0.22);
    }

    #timeSlider::-moz-range-thumb{
      width:18px;
      height:18px;
      border-radius:999px;
      border:1.5px solid rgba(255,255,255,0.7);
      background:linear-gradient(180deg,#ffffff 0%,#c6e4ff 100%);
      box-shadow:0 0 0 4px rgba(123,199,255,0.15),0 6px 16px rgba(0,0,0,0.22);
    }

    #timeTickRow{
      display:flex;
      justify-content:space-between;
      margin-top:5px;
      padding:0 1px;
      gap:8px;
    }

    .time-tick{
      font-size:9px;
      color:var(--muted);
      font-weight:600;
      opacity:0.7;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .leaflet-popup-content-wrapper{
      border-radius:16px;
      border:1px solid rgba(255,255,255,0.08);
      background:rgba(7,14,26,0.95);
      color:var(--text);
      backdrop-filter:blur(14px);
      -webkit-backdrop-filter:blur(14px);
      box-shadow:0 20px 40px rgba(0,0,0,0.35);
    }

    .leaflet-popup-tip{background:rgba(7,14,26,0.95);}

    .leaflet-tooltip{
      padding:8px 10px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,0.08);
      background:rgba(8,15,28,0.94);
      color:var(--text);
      font-size:12px;
      box-shadow:0 12px 24px rgba(0,0,0,0.22);
      backdrop-filter:blur(12px);

    #bottomTabBar{

      right:0;
      z-index:5000;
      height:calc(var(--tab-bar-height) + var(--safe-bottom));

      stroke-linejoin:round;

      top:0;
      left:50%;
      transform:translateX(-50%);
      width:32px;
      height:2px;
      border-radius:999px;
      background:var(--accent);
      box-shadow:0 0 8px rgba(123,199,255,0.6);

    .tab-btn-badge{

      right:calc(50% - 18px);
      width:7px;
      height:7px;
      border-radius:999px;
      background:var(--accent-2);
      box-shadow:0 0 6px rgba(152,240,219,0.7);

    }

    .tab-btn-badge.visible{display:block;}

    #mobileFilterSheet{
      display:none;
      position:fixed;
      bottom:0;
      left:0;
      right:0;
      z-index:6500;
      background:rgba(5,11,22,0.96);

    }

    #mobileFilterSheet.is-open{
      display:block;
      animation:sheetUp 260ms cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes sheetUp{
      from{transform:translateY(100%);opacity:0.5;}
      to{transform:translateY(0);opacity:1;}
    }

    .sheet-header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:14px 18px 12px;
      border-bottom:1px solid rgba(255,255,255,0.07);
    }

    .sheet-title{
      font-size:13px;
      font-weight:800;
      color:var(--text);
      letter-spacing:0.06em;
      text-transform:uppercase;
      padding:0;
      border-bottom:none;
      flex:1;
      text-align:center;
    }

    .sheet-close-btn{
      appearance:none;
      border:1px solid rgba(255,255,255,0.12);

      border-radius:12px;
      padding:8px 12px;
      font-size:12px;
      font-weight:700;
      cursor:pointer;
      flex-shrink:0;

    .sheet-body{padding:14px 18px;}

    .sheet-group + .sheet-group{
      margin-top:16px;
      padding-top:16px;
      border-top:1px solid rgba(255,255,255,0.07);

    .sheet-group-title{
      margin-bottom:10px;

    .sheet-row{

    .sheet-row-left{

    .sheet-row-left span:last-child{

      color:var(--text);
      font-weight:600;
      min-width:0;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    .sheet-toggle{
      appearance:none;
      width:48px;
      height:28px;
      border-radius:999px;
      background:rgba(255,255,255,0.1);
      border:1px solid rgba(255,255,255,0.12);

      position:relative;
      flex-shrink:0;
      transition:background 200ms ease,border-color 200ms ease;
    }

    .sheet-toggle::after{
      content:"";

      top:3px;
      left:3px;
      width:20px;

    }

    .sheet-toggle.is-on{
      background:rgba(43,108,255,0.85);

    @media (min-width:701px){

      #overlayHeader{

      #overlayBody{

      #mapOverlayPanel:not(.is-collapsed) #overlayBody{

      .maplibregl-ctrl-top-right,

      #timeControl{

      }

      #mobileFilterSheet{
        z-index:6500 !important;
      }

      #bottomTabBar{
        display:flex;
        z-index:6000 !important;

    }

    @media (max-width:420px){
      #overlayTitle{
        font-size:12px;
      }

      #overlayBody{

      }

        padding:12px 14px;
      }

      .sheet-row{
        padding:11px 12px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <section class="map-panel">
      <div class="map-note" id="mapNote">Klicka på kartan för att välja en punkt för vädermodulen.</div>

      <div class="map-stack">
        <div class="map-instance-wrap">
          <div id="maptilerMap"></div>

          <div class="map-topbar">
            <button id="filterToggleBtn" type="button">
              <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <line x1="2" y1="4" x2="14" y2="4"></line>
                <line x1="4" y1="8" x2="12" y2="8"></line>

  <nav id="bottomTabBar">

  <div id="mobileFilterSheet">
    <div class="sheet-header">
      <button id="mobileFilterCloseBtn" type="button" class="sheet-close-btn">Stäng</button>
      <div class="sheet-title">Visa på kartan</div>
    </div>

    <div class="sheet-body">
      <div class="sheet-group">
        <div class="sheet-group-title">Kartlager</div>

        <div class="sheet-row">
          <div class="sheet-row-left">
            <span class="layer-dot wind"></span>
            <span>Vind</span>
          </div>
          <button class="sheet-toggle is-on" id="mobileToggleWindBtn" type="button"></button>

        <div class="sheet-row">
          <div class="sheet-row-left">

          </div>

          <div class="sheet-row-left">

  <script>
   var activeMode="weather",
    showWaveObjects=false,
    showLighthouseObjects=false,
    lastObjectInteractionAt=0,
    forecastExpanded=false,
    currentForecastDays=[],
    weatherTimeseries=[],
    selectedForecastTime=null,
    timePlaybackTimer=null,
    weatherDetailsExpanded=false;

   var savedSelections={weather:null,wave:null,lighthouse:null};
var maptilerMap=null,
    maptilerWeatherMarker=null,
    maptilerWindLayer=null,
    maptilerPrecipitationLayer=null,
    maptilerCloudLayer=null,
    maptilerTimelineLayer=null;

   var windLayerVisible=false,
    precipitationLayerVisible=false,
    cloudLayerVisible=false;

    var waveStationsLayer=L.layerGroup(),
        lighthouseStationsLayer=L.layerGroup();

    var waveStationsLoaded=false,
        lighthouseStationsLoaded=false,
        waveStationsLoadingPromise=null,
        lighthouseStationsLoadingPromise=null;

    var waveBackgroundCheckStarted=false,
        lighthouseBackgroundCheckStarted=false;

    var waveMarkerMap=new Map(),
        lighthouseMarkerMap=new Map(),
        waveMaptilerMarkerMap=new Map(),
        lighthouseMaptilerMarkerMap=new Map();

    var waveStationsCache=new Map(),
        lighthouseStationsCache=new Map();

    var waterLevelStationsPromise=null,
        vivaStationsPromise=null;

    var vivaStationDataCache=new Map(),
        vivaNearestCache=new Map(),
        waveEvaluationCache=new Map(),
        lighthouseObservationCache=new Map();

    function markObjectInteraction(){ lastObjectInteractionAt=Date.now(); }
    function setText(id,v){ var el=document.getElementById(id); if(el) el.textContent=v; }

    function isMobileView(){
      return window.matchMedia("(max-width:700px)").matches;
    }

    function updateActiveLayersBadge(){
      var count=[windLayerVisible,precipitationLayerVisible,cloudLayerVisible].filter(Boolean).length;
      var badge=document.getElementById("activeLayersBadge"),
          text=document.getElementById("activeLayersText"),
          fb=document.getElementById("filterBadge");

      if(badge && text){
        badge.classList.toggle("visible",count>0);
        if(count>0) text.textContent=count+" lager";
      }
      if(fb) fb.classList.toggle("visible",count>0);
    }

    function setOverlayHeaderDot(state){
      var dot=document.getElementById("overlayHeaderDot");
      if(dot) dot.classList.toggle("loading",state==="loading");
    }

    function buildOverlayDataGrid(rows){
      return '<div class="overlay-data-grid">'+
        rows
          .filter(function(r){ return r.value && r.value!=="--"; })
          .map(function(r){
            return '<div class="overlay-data-cell"><div class="overlay-data-label">'+r.label+'</div><div class="overlay-data-value'+(r.highlight?" highlight":"")+'">'+r.value+'</div></div>';
          })
          .join("")+
        '</div>';
    }

    function renderCombinedMapOverlay(){
      var titleEl=document.getElementById("overlayTitle"),
          contentEl=document.getElementById("overlayContent");
      if(!titleEl || !contentEl) return;

      titleEl.textContent=titleEl.dataset.baseTitle || "Välj punkt";
      var base=contentEl.dataset.baseContent || "Klicka i kartan för väderdata";
      var ot=contentEl.dataset.objectTitle || "";
      var oc=contentEl.dataset.objectContent || "";

      if(ot && oc){
        contentEl.innerHTML='<div>'+base+'</div><div class="overlay-object-section"><div class="overlay-object-title">'+ot+'</div><div>'+oc+'</div></div>';
      }else{
        contentEl.innerHTML=base;
      }
    }

    function updateMapOverlay(title,content){
      var t=document.getElementById("overlayTitle"),
          c=document.getElementById("overlayContent");
      if(!t || !c) return;

      t.dataset.baseTitle=title;
      c.dataset.baseContent=content;
      renderCombinedMapOverlay();
    }

    function updateObjectOverlay(title,content){
      var c=document.getElementById("overlayContent");
      if(!c) return;
      c.dataset.objectTitle=title;
      c.dataset.objectContent=content;
      renderCombinedMapOverlay();
    }

    function hideObjectOverlay(){
      var c=document.getElementById("overlayContent");
      if(!c) return;
      c.dataset.objectTitle="";
      c.dataset.objectContent="";
      renderCombinedMapOverlay();
    }

    function formatCoord(v){ return Number(v).toFixed(4); }
    function formatTemp(v){ return v==null ? "--" : Number(v).toFixed(1)+" °C"; }
    function formatHumidity(v){ return v==null ? "--" : Math.round(Number(v))+" %"; }
    function formatRain(v){ return v==null ? "--" : Number(v).toFixed(1)+" mm"; }
    function formatWind(v){ return v==null ? "--" : Number(v).toFixed(1)+" m/s"; }
    function formatPressure(v){ return v==null ? "--" : Number(v).toFixed(1)+" hPa"; }
    function formatWave(v){ return v==null ? "--" : Number(v).toFixed(1)+" m"; }
    function formatWaterLevel(v){ return v==null ? "--" : Number(v).toFixed(1)+" cm"; }

    function formatForecastRange(min,max){
      if(min==null && max==null) return "--";
      if(min==null) return formatTemp(max);
      if(max==null) return formatTemp(min);
      return Math.round(min)+"° / "+Math.round(max)+"°";
    }

    function formatForecastDay(ds,i){
      if(!ds) return "--";
      if(i===0) return "Idag";
      if(i===1) return "Imorgon";
      return new Date(ds+"T12:00:00").toLocaleDateString("sv-SE",{weekday:"short",day:"2-digit",month:"2-digit"});
    }

    function degreesToCompass(deg){
      if(deg==null || isNaN(Number(deg))) return "--";
      return ["N","NO","O","SO","S","SV","V","NV"][Math.round(((Number(deg)%360)+360)%360/45)%8];
    }

    function formatWindDirection(deg){
      if(deg==null || isNaN(Number(deg))) return "--";
      return Math.round(Number(deg))+"° "+degreesToCompass(Number(deg));
    }
    function formatWindWithDirection(speed,deg){
  var wind=formatWind(speed);
  var dir=formatWindDirection(deg);

  if(wind==="--" && dir==="--") return "--";
  if(wind==="--") return dir;
  if(dir==="--") return wind;

  return wind+" • "+dir;
}

    function extractLatestValue(data){
      if(Array.isArray(data && data.value) && data.value.length) return data.value[data.value.length-1];
      if(Array.isArray(data && data.values) && data.values.length) return data.values[data.values.length-1];
      return null;
    }

    function extractNumericValue(v){
      if(v==null) return null;
      if(typeof v==="number") return isFinite(v) ? v : null;
      var m=String(v).replace(",",".").trim().match(/-?\d+(?:\.\d+)?/g);
      if(!m || !m.length) return null;
      var p=Number(m[m.length-1]);
      return isFinite(p) ? p : null;
    }

    function extractVivaSample(sd,names){
      var samples=Array.isArray(sd && sd.Samples) ? sd.Samples : [];
      for(var i=0;i<names.length;i++){
        var s=samples.find(function(x){ return x && x.Name===names[i]; });
        if(!s) continue;
        var nv=extractNumericValue(s.Value);
        if(nv==null) continue;
        return Object.assign({},s,{numericValue:nv});
      }
      return null;
    }

      if(!r || !r.station || !r.station.name) return "Ingen station hittades";

    }

    function toRad(d){ return d*Math.PI/180; }

    function distanceKm(a,b,c,d){
      var R=6371,
          dLat=toRad(c-a),
          dLon=toRad(d-b),
          x=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(toRad(a))*Math.cos(toRad(c))*Math.sin(dLon/2)*Math.sin(dLon/2);
      return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
    }

                       function getFirstReadyTimelineLayer(){
            var candidates=[
              maptilerTimelineLayer,
              maptilerPrecipitationLayer,
              maptilerCloudLayer,
              maptilerWindLayer
            ];

            for(var i=0;i<candidates.length;i++){
              var layer=candidates[i];
              if(!layer) continue;

              var sd=layer.getAnimationStartDate && layer.getAnimationStartDate();
              var ed=layer.getAnimationEndDate && layer.getAnimationEndDate();
              var cd=layer.getAnimationTimeDate && layer.getAnimationTimeDate();

              if(
                sd && ed && cd &&
                isFinite(+sd) &&
                isFinite(+ed) &&
                isFinite(+cd)
              ){
                return {
                  layer:layer,
                  start:+sd,
                  end:+ed,
                  current:+cd
                };
              }
            }

            return null;
          }

        if(!map.hasLayer(waveStationsLayer)) map.addLayer(waveStationsLayer);

        if(map.hasLayer(waveStationsLayer)) map.removeLayer(waveStationsLayer);
      }

        ensureLighthouseStationsLoaded();
        if(!map.hasLayer(lighthouseStationsLayer)) map.addLayer(lighthouseStationsLayer);
      }else{
        if(map.hasLayer(lighthouseStationsLayer)) map.removeLayer(lighthouseStationsLayer);
      }

      if(lb) lb.classList.toggle("visible",showLighthouseObjects);

      if(mobileLighthouseBtn) mobileLighthouseBtn.classList.toggle("is-on",showLighthouseObjects);

      if(!showWaveObjects && !showLighthouseObjects) hideObjectOverlay();

      if(!savedSelections.weather){
        updateMapOverlay("Väderpunkt","Klicka i kartan för att visa aktuell väderdata för en vald punkt.");
      }

      refreshMobileNavState();
      refreshMapSizeSoon();
    }

    function buildDailyForecast(ts){
      var dm=new Map();

      for(var i=0;i<ts.length;i++){
        var item=ts[i],
            time=item && item.time;
        if(!time) continue;

        var dk=time.slice(0,10),
            inst=(item.data && item.data.instant && item.data.instant.details) || {},
            at=inst.air_temperature,
            prec=((item.data && item.data.next_1_hours && item.data.next_1_hours.details && item.data.next_1_hours.details.precipitation_amount) || 0),
            sym=((item.data && item.data.next_1_hours && item.data.next_1_hours.summary && item.data.next_1_hours.summary.symbol_code) ||
                 (item.data && item.data.next_6_hours && item.data.next_6_hours.summary && item.data.next_6_hours.summary.symbol_code) ||
                 (item.data && item.data.next_12_hours && item.data.next_12_hours.summary && item.data.next_12_hours.summary.symbol_code) || null),
            wind=inst.wind_speed || null,
            hour=new Date(time).getHours();

        if(!dm.has(dk)){
          dm.set(dk,{
            date:dk,
            minTemp:at,
            maxTemp:at,
            precipitation:0,
            symbol:sym,
            windSpeed:wind,
            bestSymbolDistance:Math.abs(hour-12)
          });
        }

        var day=dm.get(dk);
        if(at!=null){
          day.minTemp=day.minTemp==null ? at : Math.min(day.minTemp,at);
          day.maxTemp=day.maxTemp==null ? at : Math.max(day.maxTemp,at);
        }
        day.precipitation+=Number(prec || 0);

        var sd=Math.abs(hour-12);
        if(sym && (day.symbol==null || sd<day.bestSymbolDistance)){
          day.symbol=sym;
          day.bestSymbolDistance=sd;
        }
        if(wind!=null && sd<=day.bestSymbolDistance){
          day.windSpeed=wind;
        }
      }

      return Array.from(dm.values()).slice(0,7);
    }

        setText("forecast"+(i+1)+"Rain",weatherLabelFromSymbol(day.symbol)+" • Nederbörd: "+formatRain(day.precipitation));

    async function loadWeatherForPoint(lat,lon){
      try{
        setText("weatherStatusValue","Hämtar prognos...");
        setText("weatherGustSourceValue","Hämtar...");
        resetForecastDisplay();
        setOverlayHeaderDot("loading");
        updateMapOverlay("Laddar väder...",formatCoord(lat)+", "+formatCoord(lon));

        var responses = await Promise.all([
          fetch("/api/weather?lat=" + lat + "&lon=" + lon),
          fetch("/api/openmeteo-gust?lat=" + lat + "&lon=" + lon)
        ]);

        var weatherRes = responses[0];
        var gustRes = responses[1];

        var weatherText = await weatherRes.text();
        var gustText = await gustRes.text();

        if(!weatherRes.ok) throw new Error(weatherText);

        var weatherData = JSON.parse(weatherText);
        var ts = (weatherData.properties && weatherData.properties.timeseries) || [];

        if(!ts.length) throw new Error("Ingen väderdata hittades.");

        weatherTimeseries = ts;

        var cur = ts[0];
        var inst = (cur.data && cur.data.instant && cur.data.instant.details) || {};
        var n1 = (cur.data && cur.data.next_1_hours) || {};
        var n6 = (cur.data && cur.data.next_6_hours) || {};
        var n12 = (cur.data && cur.data.next_12_hours) || {};

        var sym =
          (n1.summary && n1.summary.symbol_code) ||
          (n6.summary && n6.summary.symbol_code) ||
          (n12.summary && n12.summary.symbol_code) ||
          null;

        var prec = null;
        if(n1.details && n1.details.precipitation_amount != null){
          prec = n1.details.precipitation_amount;
        }else if(n6.details && n6.details.precipitation_amount != null){
          prec = n6.details.precipitation_amount;
        }else if(n12.details && n12.details.precipitation_amount != null){
          prec = n12.details.precipitation_amount;
        }

        setText("weatherTempValue",formatTemp(inst.air_temperature));
        setText("weatherHumidityValue",formatHumidity(inst.relative_humidity));
        setText("weatherRainValue",formatRain(prec));
        setText("weatherTypeValue",weatherLabelFromSymbol(sym));
        setText("weatherWindValue",formatWind(inst.wind_speed));
        setText("weatherDirectionValue",formatWindDirection(inst.wind_from_direction));
        setText("weatherPressureValue",formatPressure(inst.air_pressure_at_sea_level));

        currentForecastDays = buildDailyForecast(ts);
        renderForecast(currentForecastDays);

        var gustFormatted = "--";
        var gustTimeseries = [];

        if(gustRes.ok){
          var gd = JSON.parse(gustText);
          gustFormatted = formatWind(gd.value);
          gustTimeseries = gd.timeseries || [];
          setText("weatherGustValue",gustFormatted);
          setText("weatherGustSourceValue","Open-Meteo • punktdata");
          setText("weatherStatusValue",currentForecastDays.length > 0 ? "Väderdata och dagsprognos hämtad" : "Väderdata hämtad");
        }else{
          setText("weatherGustValue","--");
          setText("weatherGustSourceValue","Inga vindbyar tillgängliga");
          setText("weatherStatusValue",currentForecastDays.length > 0 ? "Väderdata och dagsprognos hämtad" : "Väderdata hämtad");
        }

        setOverlayHeaderDot("ready");

        function getGustForTime(tms){
          if(!gustTimeseries.length) return gustFormatted;

          var cl = gustTimeseries[0];
          var md = Math.abs(new Date(cl.time).getTime() - tms);

          for(var i=0;i<gustTimeseries.length;i++){
            var df = Math.abs(new Date(gustTimeseries[i].time).getTime() - tms);
            if(df < md){
              md = df;
              cl = gustTimeseries[i];
            }
          }
          return formatWind(cl.value);
        }

    async function ensureWaveStationsLoaded(){
      if(waveStationsLoaded) return;
      if(waveStationsLoadingPromise) return waveStationsLoadingPromise;

      waveStationsLoadingPromise=(async function(){
        try{
          var res=await fetch("/api/ocean-wave-stations"),
              data=await res.json(),
              stations=Array.isArray(data && data.stations) ? data.stations : [];

          if(!stations.length){
            if(activeMode==="wave") setText("waveStatusValue","Inga stationer hittades");
            return;
          }

          stations.forEach(function(s){
            waveStationsCache.set(s.id,s);

            var lm=L.circleMarker([s.latitude,s.longitude],{
              radius:5,
              weight:2,
              color:"#69b7ff",
              fillColor:"#69b7ff",
              fillOpacity:0,
              opacity:0,
              stroke:false
            });

            lm.bindTooltip(s.name+" • ännu inte kontrollerad",{direction:"top"});
            lm.on("click",function(e){
              L.DomEvent.stopPropagation(e);
              selectWaveStation(s);
            });

            waveMarkerMap.set(s.id,lm);
            waveStationsLayer.addLayer(lm);

            if(maptilerMap && window.maptilersdk){
              var el=document.createElement("div");
              Object.assign(el.style,{
                width:"10px",
                height:"10px",
                borderRadius:"999px",
                background:"#69b7ff",
                border:"2px solid rgba(255,255,255,0.75)",
                boxShadow:"0 0 0 4px rgba(105,183,255,0.12)",
                cursor:"pointer",
                display:"none"
              });
              el.title=s.name+" • ännu inte kontrollerad";
              el.addEventListener("click",function(e){
                e.stopPropagation();
                selectWaveStation(s);
              });
              var mm=new maptilersdk.Marker({element:el}).setLngLat([s.longitude,s.latitude]).addTo(maptilerMap);
              waveMaptilerMarkerMap.set(s.id,{marker:mm,element:el});
            }
          });

          waveStationsLoaded=true;
          if(activeMode==="wave") setText("waveStatusValue","Kontrollerar vilka bojar som har data...");
          startWaveBackgroundCheck();
        }catch(e){
          console.error(e);
          if(activeMode==="wave") setText("waveStatusValue","Det gick inte att hämta stationer");
        }finally{
          waveStationsLoadingPromise=null;
        }
      })();

      return waveStationsLoadingPromise;
    }

    async function fetchWaveDataForStation(id){
      for(var p of ["latest-hour","latest-day","latest-months"]){
        var res=await fetch("/api/ocean-wave-height?stationId="+id+"&period="+p),
            data=await res.json();
        if(!res.ok) continue;
        var l=extractLatestValue(data);
        if(l && l.value!=null && l.value!=="") return {latest:l,period:p,source:"SMHI"};
      }
      return null;
    }

    async function getWaterLevelStations(){
      if(!waterLevelStationsPromise){
        waterLevelStationsPromise=(async function(){
          var res=await fetch("/api/ocean-stations"),
              data=await res.json();

          var st=Array.isArray(data && data.station) ? data.station :
                 Array.isArray(data && data.stations) ? data.stations :
                 Array.isArray(data && data.resource) ? data.resource : [];

          return st.map(function(s){
            var id=s.id || s.key || s.stationId,
                lat=Number(s.latitude),
                lon=Number(s.longitude);
            if(!id || isNaN(lat) || isNaN(lon)) return null;
            return {
              id:id,
              name:s.name || "Okänd station",
              latitude:lat,
              longitude:lon
            };
          }).filter(Boolean);
        })();
      }
      return waterLevelStationsPromise;
    }

    async function fetchVivaStationData(id){

      var p=(async function(){
        var res=await fetch("/api/viva-station?stationId="+id),
            data=await res.json();
        if(!res.ok) throw new Error(data && data.message || "Fel");
        return data.station || null;
      })();

      vivaStationDataCache.set(id,p);

      try{
        return await p;
      }catch(e){
        vivaStationDataCache.delete(id);
        throw e;
      }

    async function findNearestVivaObservationForPoint(lat,lon,names,lm){
      var ck=buildVivaNearestCacheKey(lat,lon,names,lm);
      if(vivaNearestCache.has(ck)) return vivaNearestCache.get(ck);

      var p=(async function(){
        var st=await getVivaStations();
        var rk=st.map(function(s){
          return Object.assign({},s,{distanceKm:distanceKm(lat,lon,s.latitude,s.longitude)});
        }).sort(function(a,b){
          return a.distanceKm-b.distanceKm;
        }).slice(0,lm?4:10);

        for(var s of rk){
          if(s.distanceKm>80) continue;
          try{
            var sd=await fetchVivaStationData(s.id),
                sa=extractVivaSample(sd,names);
            if(sa){
              return {
                station:s,
                latest:{value:sa.numericValue,time:sa.Updated || null},
                source:"VIVA",
                sampleName:sa.Name
              };
            }
          }catch(e){
            console.warn("VIVA misslyckades",s.id,e);
          }
        }
        return null;
      })();

      vivaNearestCache.set(ck,p);

      try{
        return await p;
      }catch(e){
        vivaNearestCache.delete(ck);
        throw e;
      }
    }

    async function findNearestWaterLevelForPoint(lat,lon,lm){
      var st=await getWaterLevelStations();
      var rk=st.map(function(s){
        return Object.assign({},s,{distanceKm:distanceKm(lat,lon,s.latitude,s.longitude)});
      }).sort(function(a,b){
        return a.distanceKm-b.distanceKm;
      }).slice(0,lm?5:15);

      var periods=lm ? ["latest-hour","latest-day"] : ["latest-hour","latest-day","latest-months"];

      for(var s of rk){
        for(var per of periods){
          var res=await fetch("/api/ocean-water-level?stationId="+s.id+"&period="+per),
              data=await res.json();
          if(!res.ok) continue;
          var l=extractLatestValue(data);
          if(l && l.value!=null && l.value!==""){
            return {station:s,latest:l,period:per,source:"SMHI"};
          }
        }
      }
      return null;
    }

    async function evaluateWaveStation(s,lm){
      var ck=buildWaveEvaluationCacheKey(s,lm);
      if(waveEvaluationCache.has(ck)) return waveEvaluationCache.get(ck);

      var p=(async function(){
        var results=await Promise.all([
          findNearestVivaObservationForPoint(s.latitude,s.longitude,["Våghöjd"],lm),
          findNearestVivaObservationForPoint(s.latitude,s.longitude,["Vattenstånd"],lm),
          findNearestVivaObservationForPoint(s.latitude,s.longitude,["Vattentemperatur","Vatten Temperatur","Ytvattentemperatur"],lm)
        ]);

        var vw=results[0],
            vwt=results[1],
            vwtp=results[2];

        var fallbackResults=await Promise.all([
          vw ? Promise.resolve(null) : fetchWaveDataForStation(s.id),
          vwt ? Promise.resolve(null) : findNearestWaterLevelForPoint(s.latitude,s.longitude,lm)
        ]);

        var sw=fallbackResults[0],
            swt=fallbackResults[1];

        var wr=vw || sw,
            wtr=vwt || swt,
            wtrp=vwtp || null;

        return {
          waveResult:wr,
          waterResult:wtr,
          waterTempResult:wtrp,
          hasAnySeaData:Boolean(wr || wtr)
        };
      })();

      waveEvaluationCache.set(ck,p);

      try{
        return await p;
      }catch(e){
        waveEvaluationCache.delete(ck);
        throw e;
      }
    }

          if(uv && us) st="Havsdata • VIVA + SMHI";

        setWaveMarkerColorById(s.id,has ? "active" : "inactive",s.name+" • "+(has ? "data tillgänglig" : "ingen data"));

        setWaveMarkerColorById(s.id,"inactive",s.name+" • kunde inte hämtas");
      }

    async function startWaveBackgroundCheck(){
      if(waveBackgroundCheckStarted) return;
      waveBackgroundCheckStarted=true;

      var stations=Array.from(waveStationsCache.values()),
          checked=0,
          index=0;

      async function worker(){
        while(index<stations.length){
          var s=stations[index++];
          try{
            var r=await evaluateWaveStation(s,true);
            setWaveMarkerColorById(s.id,r.hasAnySeaData ? "active" : "inactive",s.name+" • "+(r.hasAnySeaData ? "data tillgänglig" : "ingen data"));
          }catch(e){
            setWaveMarkerColorById(s.id,"inactive",s.name+" • kunde inte hämtas");
          }
          checked++;
          if(activeMode==="wave") setText("waveStatusValue","Bakgrundskontroll bojar: "+checked+"/"+stations.length);
        }
      }

      await Promise.all(Array.from({length:3},function(){ return worker(); }));

      if(activeMode==="wave") setText("waveStatusValue","Bakgrundskontroll av bojar slutförd");
    }

    async function ensureLighthouseStationsLoaded(){
      if(lighthouseStationsLoaded) return;
      if(lighthouseStationsLoadingPromise) return lighthouseStationsLoadingPromise;

      lighthouseStationsLoadingPromise=(async function(){
        try{
          var res=await fetch("/api/lighthouse-stations"),
              data=await res.json(),
              stations=Array.isArray(data && data.stations) ? data.stations : [];

          if(!stations.length){
            if(activeMode==="lighthouse") setText("lighthouseStatusValue","Inga stationer hittades");
            return;
          }

          stations.forEach(function(s){
            lighthouseStationsCache.set(s.id,s);

            var lm=L.circleMarker([s.latitude,s.longitude],{
              radius:5,
              weight:2,
              color:"#9bffb0",
              fillColor:"#9bffb0",
              fillOpacity:0,
              opacity:0,
              stroke:false
            });

            lm.bindTooltip(s.name+" • ännu inte kontrollerad",{direction:"top"});
            lm.on("click",function(e){
              L.DomEvent.stopPropagation(e);
              selectLighthouseStation(s);
            });

            lighthouseMarkerMap.set(s.id,lm);
            lighthouseStationsLayer.addLayer(lm);

            if(maptilerMap && window.maptilersdk){
              var el=document.createElement("div");
              Object.assign(el.style,{
                width:"10px",
                height:"10px",
                borderRadius:"999px",
                background:"#9bffb0",
                border:"2px solid rgba(255,255,255,0.75)",
                boxShadow:"0 0 0 4px rgba(155,255,176,0.12)",
                cursor:"pointer",
                display:"none"
              });
              el.title=s.name+" • ännu inte kontrollerad";
              el.addEventListener("click",function(e){
                e.stopPropagation();
                selectLighthouseStation(s);
              });
              var mm=new maptilersdk.Marker({element:el}).setLngLat([s.longitude,s.latitude]).addTo(maptilerMap);
              lighthouseMaptilerMarkerMap.set(s.id,{marker:mm,element:el});
            }
          });

          lighthouseStationsLoaded=true;
          if(activeMode==="lighthouse") setText("lighthouseStatusValue","Kontrollerar vilka stationer som har data...");
          startLighthouseBackgroundCheck();
        }catch(e){
          console.error(e);
          if(activeMode==="lighthouse") setText("lighthouseStatusValue","Det gick inte att hämta stationer");
        }finally{
          lighthouseStationsLoadingPromise=null;
        }
      })();

      return lighthouseStationsLoadingPromise;
    }

    async function fetchLighthouseObservations(id){
      if(lighthouseObservationCache.has(id)) return lighthouseObservationCache.get(id);

      var p=(async function(){
        var res=await fetch("/api/lighthouse-observations?stationId="+id),
            data=await res.json();
        if(!res.ok) throw new Error(data && data.message || "Fel");

        var obs=data.observations || {};
        var has=Boolean(
          (obs.temp && obs.temp.value!=null) ||
          (obs.windSpeed && obs.windSpeed.value!=null) ||
          (obs.windDir && obs.windDir.value!=null) ||
          (obs.pressure && obs.pressure.value!=null) ||
          (obs.gust && obs.gust.value!=null)
        );

        return {obs:obs,hasAnyData:has};
      })();

      lighthouseObservationCache.set(id,p);

      try{
        return await p;
      }catch(e){
        lighthouseObservationCache.delete(id);
        throw e;
      }
    }

    async function selectLighthouseStation(s){
      markObjectInteraction();
      saveSelection("lighthouse",{id:s.id,name:s.name,lat:s.latitude,lon:s.longitude});
      setLighthouseSelectionMarker(s.latitude,s.longitude,s.name);
      updateObjectOverlay(s.name || "Fyr / station","Laddar data...");

      try{
        var result=await fetchLighthouseObservations(s.id),
            obs=result.obs,
            has=result.hasAnyData;

        var tv=formatObservedValue(formatTemp(obs.temp && obs.temp.value),obs.temp);
        var wv=formatObservedValue(formatWind(obs.windSpeed && obs.windSpeed.value),obs.windSpeed);
        var dv=formatObservedValue(formatWindDirection(obs.windDir && obs.windDir.value),obs.windDir);
        var gv=formatObservedValue(formatWind(obs.gust && obs.gust.value),obs.gust);
        var pv=formatObservedValue(formatPressure(obs.pressure && obs.pressure.value),obs.pressure);

        setText("lhTempValue",tv);
        setText("lhWindValue",wv);
        setText("lhWindDirValue",dv);
        setText("lhGustValue",gv);
        setText("lhPressureValue",pv);
        setText("lighthouseStatusValue",has ? "Stationsdata hämtad" : "Ingen aktuell data tillgänglig");

        updateObjectOverlay(
          s.name || "Fyr / station",
          buildOverlayDataGrid([
            {label:"Temp",value:tv,highlight:true},
            {label:"Vind",value:wv},
            {label:"Byar",value:gv},
            {label:"Riktning",value:dv},
            {label:"Tryck",value:pv}
          ])
        );

        setLighthouseMarkerColorById(s.id,has ? "active" : "inactive",s.name+" • "+(has ? "data tillgänglig" : "ingen data"));
        refreshMapSizeSoon();
      }catch(e){
        console.error(e);
        setText("lighthouseStatusValue","Det gick inte att hämta stationsdata");
        updateObjectOverlay(s.name || "Fyr / station","Det gick inte att hämta data.");
        setLighthouseMarkerColorById(s.id,"inactive",s.name+" • kunde inte hämtas");
      }
    }

    async function startLighthouseBackgroundCheck(){
      if(lighthouseBackgroundCheckStarted) return;
      lighthouseBackgroundCheckStarted=true;

      var stations=Array.from(lighthouseStationsCache.values()),
          checked=0,
          index=0;

      async function worker(){
        while(index<stations.length){
          var s=stations[index++];
          try{
            var result=await fetchLighthouseObservations(s.id);
            setLighthouseMarkerColorById(s.id,result.hasAnyData ? "active" : "inactive",s.name+" • "+(result.hasAnyData ? "data tillgänglig" : "ingen data"));
          }catch(e){
            setLighthouseMarkerColorById(s.id,"inactive",s.name+" • kunde inte hämtas");
          }
          checked++;
          if(activeMode==="lighthouse") setText("lighthouseStatusValue","Bakgrundskontroll stationer: "+checked+"/"+stations.length);
        }
      }

      await Promise.all(Array.from({length:5},function(){ return worker(); }));

      if(activeMode==="lighthouse") setText("lighthouseStatusValue","Bakgrundskontroll av stationer slutförd");
    }

    var overlayCollapseBtn=document.getElementById("overlayCollapseBtn");
    var mapOverlayPanel=document.getElementById("mapOverlayPanel");
    var overlayContentEl=document.getElementById("overlayContent");

    function updateOverlayCollapseButtonText(){
      if(!overlayCollapseBtn || !mapOverlayPanel) return;
      overlayCollapseBtn.textContent = mapOverlayPanel.classList.contains("is-collapsed") ? "Visa" : "Dölj";
    }

    function toggleOverlayCollapsed(forceState){
      if(!mapOverlayPanel) return;

      if(typeof forceState==="boolean"){
        mapOverlayPanel.classList.toggle("is-collapsed",forceState);
      }else{
        mapOverlayPanel.classList.toggle("is-collapsed");
      }

      updateOverlayCollapseButtonText();
      refreshMapSizeSoon();
    }

    if(overlayCollapseBtn){
      overlayCollapseBtn.addEventListener("click",function(e){
        e.stopPropagation();
        toggleOverlayCollapsed();
      });
    }
    if(overlayContentEl){
  overlayContentEl.addEventListener("click",function(e){
    if(e.target && e.target.id==="weatherDetailsToggleBtn"){
      e.stopPropagation();
      weatherDetailsExpanded=!weatherDetailsExpanded;
      if(window.updateWeatherForSelectedTime){
        window.updateWeatherForSelectedTime();
      }
    }
  });
}

    if(isMobileView()){
      toggleOverlayCollapsed(false);
    }else{
      updateOverlayCollapseButtonText();
    }

    var filterDrawer=document.getElementById("filterDrawer"),
        filterToggleBtn=document.getElementById("filterToggleBtn"),
        filterCloseBtn=document.getElementById("filterCloseBtn");

    function closeFilterDrawer(){
      if(filterDrawer) filterDrawer.classList.add("is-hidden");
    }

    if(filterDrawer){
      filterDrawer.addEventListener("click",function(e){ e.stopPropagation(); });
      filterDrawer.addEventListener("touchstart",function(e){ e.stopPropagation(); },{passive:true});
    }

    if(filterToggleBtn){
      filterToggleBtn.addEventListener("click",function(e){
        e.stopPropagation();
        if(filterDrawer) filterDrawer.classList.toggle("is-hidden");
        refreshMapSizeSoon();
      });
      filterToggleBtn.addEventListener("touchstart",function(e){ e.stopPropagation(); },{passive:true});
    }

    if(filterCloseBtn){
      filterCloseBtn.addEventListener("click",function(e){
        e.stopPropagation();
        closeFilterDrawer();
        refreshMapSizeSoon();
      });
    }

    var toggleWaveModeBtn=document.getElementById("toggleWaveModeBtn");
    if(toggleWaveModeBtn){
      toggleWaveModeBtn.addEventListener("click",function(){
        showWaveObjects=!showWaveObjects;
        updateModeUI();
      });
    }

    var toggleLighthouseModeBtn=document.getElementById("toggleLighthouseModeBtn");
    if(toggleLighthouseModeBtn){
      toggleLighthouseModeBtn.addEventListener("click",function(){
        showLighthouseObjects=!showLighthouseObjects;
        updateModeUI();
      });
    }

    var mobileFilterSheet=document.getElementById("mobileFilterSheet");
    var mobileFilterCloseBtn=document.getElementById("mobileFilterCloseBtn");

    function openMobileFilterSheet(){
      if(!mobileFilterSheet) return;
      mobileFilterSheet.classList.add("is-open");
      refreshMobileNavState();
      refreshMapSizeSoon();
    }

    function closeMobileFilterSheet(){
      if(!mobileFilterSheet) return;
      mobileFilterSheet.classList.remove("is-open");
      refreshMobileNavState();
      refreshMapSizeSoon();
    }

    var tabWeather=document.getElementById("tabWeather");
    if(tabWeather){
      tabWeather.addEventListener("click",function(){
        closeMobileFilterSheet();
        refreshMobileNavState();
        refreshMapSizeSoon();
      });
    }

    var tabWave=document.getElementById("tabWave");
    if(tabWave){
      tabWave.addEventListener("click",function(){
        closeMobileFilterSheet();
        showWaveObjects=!showWaveObjects;
        updateModeUI();
        refreshMobileNavState();
      });
    }

    var tabLighthouse=document.getElementById("tabLighthouse");
    if(tabLighthouse){
      tabLighthouse.addEventListener("click",function(){
        closeMobileFilterSheet();
        showLighthouseObjects=!showLighthouseObjects;
        updateModeUI();
        refreshMobileNavState();
      });
    }

    var tabFilter=document.getElementById("tabFilter");
    if(tabFilter){
      tabFilter.addEventListener("click",function(e){
        e.stopPropagation();
        if(!mobileFilterSheet) return;

        if(mobileFilterSheet.classList.contains("is-open")){
          closeMobileFilterSheet();
        }else{
          openMobileFilterSheet();
        }
      });
    }

    if(mobileFilterCloseBtn){
      mobileFilterCloseBtn.addEventListener("click",function(e){
        e.stopPropagation();
        closeMobileFilterSheet();
      });
    }

    document.addEventListener("click",function(e){
      if(
        mobileFilterSheet &&
        mobileFilterSheet.classList.contains("is-open") &&
        !mobileFilterSheet.contains(e.target) &&
        e.target.id!=="tabFilter"
      ){
        closeMobileFilterSheet();
      }
    });

    function setMaptilerWeatherMarker(lat,lon){
      if(!maptilerMap || !window.maptilersdk) return;
      if(maptilerWeatherMarker) maptilerWeatherMarker.remove();
      maptilerWeatherMarker=new maptilersdk.Marker().setLngLat([lon,lat]).addTo(maptilerMap);
    }

function handlePrimaryMapClick(lat,lon){
  if(Date.now()-lastObjectInteractionAt<500) return;
  weatherDetailsExpanded=false;
  saveSelection("weather",{lat:lat,lon:lon});
  setWeatherMarker(lat,lon);
  setMaptilerWeatherMarker(lat,lon);
  loadWeatherForPoint(lat,lon);
}

    map.on("click",function(e){
      handlePrimaryMapClick(e.latlng.lat,e.latlng.lng);
    });

    if(maptilerMap){
      maptilerMap.on("click",function(e){
        if(e.lngLat) handlePrimaryMapClick(e.lngLat.lat,e.lngLat.lng);
      });
    }

    window.addEventListener("resize",refreshMapSizeSoon);
    window.addEventListener("orientationchange",refreshMapSizeSoon);

    updateModeUI();
    updateActiveLayersBadge();

    Promise.all([
      ensureWaveStationsLoaded().catch(function(e){console.error("Preload bojar misslyckades",e);}),
      ensureLighthouseStationsLoaded().catch(function(e){console.error("Preload fyrar misslyckades",e);})
    ]);

    function updateAppHeightVars(){
      var vh = window.innerHeight;
      document.documentElement.style.setProperty("--app-height", vh + "px");

      var bottomBar = document.getElementById("bottomTabBar");
      var bottomBarHeight = 0;

      if (bottomBar && window.getComputedStyle(bottomBar).display !== "none") {
        bottomBarHeight = bottomBar.offsetHeight;
      }

      var extraGap = 18;
      document.documentElement.style.setProperty("--bottom-ui-offset", bottomBarHeight + "px");
      document.documentElement.style.setProperty("--time-control-bottom", (bottomBarHeight + extraGap) + "px");
    }

    window.addEventListener("resize", updateAppHeightVars);
    window.addEventListener("orientationchange", updateAppHeightVars);
    window.addEventListener("load", updateAppHeightVars);

    setTimeout(updateAppHeightVars, 100);
    setTimeout(updateAppHeightVars, 500);
    setTimeout(updateAppHeightVars, 1000);

    setTimeout(function(){
      updateAppHeightVars();
      refreshMapSizeSoon();
    },120);

    setTimeout(function(){
      updateAppHeightVars();
      refreshMapSizeSoon();
    },500);
  </script>
