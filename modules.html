<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ÄNDRAD -->
  <title>Kustväder</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    /* ALL CSS ORÖRD */
    :root {
      --bg: #0b1220;
      --bg-soft: #121a2b;
      --card: rgba(255, 255, 255, 0.08);
      --card-border: rgba(255, 255, 255, 0.12);
      --text: #eef4ff;
      --muted: #a9b4c9;
      --accent: #69b7ff;
      --accent-2: #8ef0d0;
      --danger: #ff8b8b;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
      --radius: 20px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, #173057 0%, transparent 35%),
        radial-gradient(circle at top right, #0f4c5c 0%, transparent 30%),
        linear-gradient(180deg, #08101d 0%, #0b1220 100%);
      min-height: 100vh;
    }

    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px;
    }

    .hero,
    .map-panel,
    .module-card {
      background: var(--card);
      border: 1px solid var(--card-border);
      backdrop-filter: blur(14px);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 28px;
      margin-bottom: 20px;
    }

    .hero-top {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .title-wrap h1 {
      margin: 0 0 8px;
      font-size: 34px;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(105, 183, 255, 0.14);
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--accent-2);
    }

    .map-panel {
      padding: 18px;
      margin-bottom: 20px;
    }

    #map {
      height: 450px;
      border-radius: 18px;
    }
  </style>
</head>

<body>
  <div class="container">

    <section class="hero">
      <div class="hero-top">

        <div class="title-wrap">
          <!-- ÄNDRAD -->
          <h1>Kustväder</h1>

          <!-- ÄNDRAD -->
          <p class="subtitle">
            Väder, havsdata och stationsobservationer i realtid.
          </p>
        </div>

        <div class="status-pill">
          <span class="dot"></span>
          <span id="pageStatus">Vädermodul aktiv</span>
        </div>

      </div>
    </section>

    <section class="map-panel">
      <div id="map"></div>
    </section>

  </div>

<script>
/* ALL JS ORÖRD */
</script>

</body>
</html>
