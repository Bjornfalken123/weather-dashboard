<!DOCTYPE html>
<html>
<head>
  <title>Weather Dashboard</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    .card { border: 1px solid #ccc; padding: 15px; margin: 10px 0; }
  </style>
</head>
<body>

<h1>🌤️ Weather Dashboard</h1>

<div id="weather"></div>

<script>
async function loadWeather() {
  const lat = 59.33;
  const lon = 18.06;

  // Weather (Open-Meteo)
  const weatherRes = await fetch(
    `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,precipitation,wind_speed_10m,wind_gusts_10m`
  );
  const weather = await weatherRes.json();

  // Air quality
  const airRes = await fetch(
    `https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${lat}&longitude=${lon}&current=pm10,pm2_5,nitrogen_dioxide,ozone`
  );
  const air = await airRes.json();

  const html = `
    <div class="card">🌡️ Temp: ${weather.current.temperature_2m} °C</div>
    <div class="card">🌧️ Nederbörd: ${weather.current.precipitation} mm</div>
    <div class="card">💨 Vind: ${weather.current.wind_speed_10m} m/s</div>
    <div class="card">🌬️ Vindbyar: ${weather.current.wind_gusts_10m} m/s</div>
    <div class="card">🌫️ PM2.5: ${air.current.pm2_5}</div>
    <div class="card">🌫️ PM10: ${air.current.pm10}</div>
    <div class="card">🧪 NO₂: ${air.current.nitrogen_dioxide}</div>
    <div class="card">☀️ O₃: ${air.current.ozone}</div>
  `;

  document.getElementById("weather").innerHTML = html;
}

loadWeather();
</script>

</body>
</html>
