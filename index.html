<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Väderdashboard</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#0f172a;
  color:#e2e8f0;
  padding:20px;
}

h1 { margin-bottom:10px; }

.status { margin-bottom:20px; color:#93c5fd; }

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:16px;
}

.card {
  background:#1e293b;
  border-radius:16px;
  padding:16px;
  border:1px solid #334155;
}

.label { font-size:14px; color:#94a3b8; margin-bottom:6px; }
.value { font-size:28px; font-weight:bold; }

.error {
  color:#fca5a5;
  margin-top:10px;
  white-space:pre-wrap;
}
</style>
</head>

<body>

<h1>Väderdashboard</h1>
<div id="status" class="status">Laddar data...</div>
<div id="error" class="error"></div>

<div class="grid">

  <div class="card">
    <div class="label">Temperatur</div>
    <div class="value" id="temp">--</div>
  </div>

  <div class="card">
    <div class="label">Nederbörd (nästa timme)</div>
    <div class="value" id="rain">--</div>
  </div>

  <div class="card">
    <div class="label">Vind</div>
    <div class="value" id="wind">--</div>
  </div>

  <div class="card">
    <div class="label">Vindbyar</div>
    <div class="value" id="gust">--</div>
  </div>

  <div class="card">
    <div class="label">Vindriktning</div>
    <div class="value" id="windDir">--</div>
  </div>

  <div class="card">
    <div class="label">Lufttryck</div>
    <div class="value" id="pressure">--</div>
  </div>

  <div class="card">
    <div class="label">Molnighet</div>
    <div class="value" id="clouds">--</div>
  </div>

  <div class="card">
    <div class="label">Luftkvalitet</div>
    <div class="value">Kommer snart</div>
  </div>

</div>

<script>
const lat = 59.3293;
const lon = 18.0686;

function set(id, value) {
  const el = document.getElementById(id);
  if (el) el.textContent = value;
}

function format(v, d=1) {
  if (v === undefined || v === null || Number.isNaN(Number(v))) return "--";
  return Number(v).toFixed(d);
}

function findBest(ts) {
  return ts.find(x => x?.data?.instant?.details?.wind_speed_of_gust !== undefined) || ts[0];
}

async function load() {
  const status = document.getElementById("status");
  const error = document.getElementById("error");

  try {
    const res = await fetch(`/api/weather?lat=${lat}&lon=${lon}`);
    const text = await res.text();

    if (!res.ok) throw new Error(text);

    const data = JSON.parse(text);
    const ts = findBest(data.properties.timeseries);

    const instant = ts.data.instant.details;
    const next1h = ts.data.next_1_hours?.details || {};

    set("temp", format(instant.air_temperature) + " °C");
    set("rain", format(next1h.precipitation_amount) + " mm");
    set("wind", format(instant.wind_speed) + " m/s");
    set("gust", format(instant.wind_speed_of_gust) + " m/s");
    set("windDir", format(instant.wind_from_direction,0) + " °");
    set("pressure", format(instant.air_pressure_at_sea_level) + " hPa");
    set("clouds", format(instant.cloud_area_fraction,0) + " %");

    status.textContent = "Live";
  } catch (e) {
    status.textContent = "Fel";
    error.textContent = e.message;
  }
}

load();
</script>

</body>
</html>
